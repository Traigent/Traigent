# SonarQube Local Project Configuration
# Use this instead of sonar-project.properties when running locally

sonar.host.url=http://localhost:9000
sonar.projectKey=traigent-local
sonar.projectName=Traigent SDK (Local)
sonar.projectVersion=1.1.0

# Source code location
sonar.sources=traigent/
sonar.exclusions=**/__pycache__/**,**/venv/**,**/*.pyc,**/build/**,**/dist/**,**/archive/**,**/node_modules/**,**/examples/**,**/playground/**,**/experimental/**,**/demos/**,**/scripts/**,**/walkthrough/**

# Python-specific settings
sonar.python.version=3.8,3.9,3.10,3.11,3.12

# Test coverage
sonar.coverage.exclusions=**/test_*.py,**/tests/**,**/examples/**,**/demos/**,**/playground/**

# Code quality settings (same as cloud)
sonar.python.complexity.cognitiveThreshold=15
sonar.python.complexity.cyclomaticThreshold=10

# File encoding
sonar.sourceEncoding=UTF-8

# Coverage reports (optional - generate with pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml
