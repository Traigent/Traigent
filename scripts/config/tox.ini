[tox]
envlist = py{38,39,310,311,312}, lint, type, security, docs, build
isolated_build = true
skip_missing_interpreters = true

[gh-actions]
python =
    3.8: py38
    3.9: py39
    3.10: py310
    3.11: py311, lint, type, security, docs, build
    3.12: py312

[testenv]
deps =
    pytest>=7.0.0
    pytest-asyncio>=0.21.0
    pytest-cov>=4.0.0
    pytest-mock>=3.10.0
    pytest-xdist>=3.0.0
extras = all
setenv =
    PYTHONPATH = {toxinidir}
    TRAIGENT_MOCK_LLM = true
    COVERAGE_FILE = {envtmpdir}/.coverage
commands =
    pytest {posargs:tests/unit tests/integration} \
        --cov=traigent \
        --cov-report=term-missing \
        --cov-report=xml:{envtmpdir}/coverage.xml \
        --cov-report=html:{envtmpdir}/htmlcov \
        --junit-xml={envtmpdir}/pytest.xml \
        -v

[testenv:lint]
deps =
    ruff>=0.1.0
    black>=22.0.0
    isort>=5.10.0
commands =
    ruff check traigent/
    black --check traigent/
    isort --check-only traigent/

[testenv:type]
deps =
    mypy>=1.0.0
    types-requests
    types-setuptools
commands =
    mypy traigent/ --install-types --non-interactive

[testenv:security]
deps =
    bandit[toml]>=1.7.0
    safety>=2.0.0
commands =
    bandit -r traigent/ -ll
    safety check

[testenv:docs]
deps =
    mkdocs>=1.4.0
    mkdocs-material>=9.0.0
    mkdocstrings[python]>=0.22.0
    markdown>=3.4.0
extras = docs
commands =
    mkdocs build --strict

[testenv:build]
deps =
    build>=0.10.0
    twine>=4.0.0
commands =
    python -m build
    twine check dist/*

[testenv:examples]
deps =
    {[testenv]deps}
extras = examples
setenv =
    {[testenv]setenv}
    TRAIGENT_MOCK_LLM = true
commands =
    pytest tests/examples/ -v {posargs}

[testenv:integration]
deps =
    {[testenv]deps}
extras = all
setenv =
    {[testenv]setenv}
commands =
    pytest tests/integration/ -v --tb=short {posargs}

[testenv:e2e]
deps =
    {[testenv]deps}
extras = all
setenv =
    {[testenv]setenv}
    # Remove mock mode for true end-to-end tests
    TRAIGENT_MOCK_LLM =
commands =
    pytest tests/e2e/ -v --tb=short {posargs}

[testenv:performance]
deps =
    {[testenv]deps}
    pytest-benchmark>=4.0.0
    memory-profiler>=0.60.0
extras = all
setenv =
    {[testenv]setenv}
commands =
    pytest tests/performance/ -v --benchmark-only {posargs}

[testenv:coverage]
deps =
    {[testenv]deps}
    coverage[toml]>=6.0.0
extras = all
setenv =
    {[testenv]setenv}
commands =
    coverage run -m pytest tests/unit tests/integration
    coverage report --show-missing
    coverage html
    coverage xml

[testenv:clean]
deps = coverage[toml]
skip_install = true
commands =
    coverage erase
    python -c "import shutil; shutil.rmtree('dist', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('build', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.tox', ignore_errors=True)"
    python -c "import shutil, pathlib; [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('.').rglob('*.egg-info')]"
    python -c "import shutil, pathlib; [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('.').rglob('__pycache__')]"
    python -c "import shutil, pathlib; [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('.').rglob('.pytest_cache')]"

[flake8]
max-line-length = 88
exclude =
    .git,
    __pycache__,
    .tox,
    .eggs,
    *.egg,
    build,
    dist,
    .venv,
    venv,
    demos,
    examples
ignore =
    E203,
    E501,
    W503

[coverage:run]
source = traigent
omit =
    */tests/*
    */test_*
    */__init__.py
    */demos/*
    */examples/*
    */docs/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod
    TYPE_CHECKING
