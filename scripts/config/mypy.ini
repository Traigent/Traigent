[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_any_generics = False
ignore_missing_imports = True
follow_imports = silent
show_column_numbers = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
check_untyped_defs = True
no_implicit_reexport = True
no_implicit_optional = True
strict_equality = True

# Directories to check
files = traigent, tests, examples

# Exclude patterns
exclude = (?x)(
    ^venv/
    | ^traigent_test_env/
    | ^demo_venv/
    | ^test_env/
    | ^archive/
    | ^build/
    | ^dist/
    | \.egg-info
    | __pycache__
    | \.mypy_cache
    | \.pytest_cache
    | spider_eval
    | node_modules
)

# Per-module options
[mypy-tests.*]
ignore_errors = False
disallow_untyped_defs = False

[mypy-examples.*]
ignore_errors = True
disallow_untyped_defs = False

[mypy-demos.*]
ignore_errors = True
disallow_untyped_defs = False

# Third-party modules
[mypy-pytest.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-torch.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True
