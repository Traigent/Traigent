version: 3
base_reference: "previous_release_tag"
enforce_per_file_dual_review: true
enforce_per_file_four_angle_review: true
enforce_per_file_artifact_matrix: true
default_review_mode: strict
artifact_reuse:
  enabled: true
  search_previous_runs: true
  require_file_unchanged: true
review_modes:
  strict:
    description: Full release-readiness review with all peer lanes and all angles.
    required_review_types:
      - primary
      - secondary
      - tertiary
      - reconciliation
    required_angles:
      - security_authz
      - correctness_regression
      - async_concurrency_performance
      - dto_api_contract
    require_component_evidence: true
    allow_previous_artifact_reuse: true
    skip_if_file_unchanged_and_artifact_exists: true
    single_model: false
    file_review_agent_matrix:
      primary:
        - codex_cli
      secondary:
        - claude_cli
      tertiary:
        - codex_cli
        - copilot_cli
      reconciliation:
        - codex_cli
  quick:
    description: Fast incremental review using one model lane and a reduced angle set.
    required_review_types:
      - primary
    required_angles:
      - security_authz
      - correctness_regression
      - async_concurrency_performance
    require_component_evidence: false
    allow_previous_artifact_reuse: true
    skip_if_file_unchanged_and_artifact_exists: true
    single_model: true
    file_review_agent_matrix:
      primary:
        - codex_cli
        - claude_cli
        - copilot_cli
file_review_agent_matrix:
  primary:
    - codex_cli
  secondary:
    - claude_cli
  tertiary:
    - codex_cli
    - copilot_cli
  reconciliation:
    - codex_cli
include:
  - "traigent/**/*.py"
  - "traigent_validation/**/*.py"
  - "tests/**/*.py"
  - ".github/workflows/*.yml"
  - "pyproject.toml"
  - "requirements/**/*.txt"
  - "Makefile"
  - "uv.lock"
  - "scripts/**/*.py"
  - "scripts/**/*.sh"
  - "README.md"
  - "CHANGELOG.md"
  - "CONTRIBUTING.md"
  - "MAINTENANCE.md"
  - "docs/**/*.md"
  - "docs/**/*.yaml"
  - "docs/**/*.yml"
  - "docs/**/*.json"
  - "examples/**/*.py"
  - "walkthrough/**/*.py"
  - ".release_review/**/*.md"
  - ".release_review/automation/**/*.py"
exclude:
  - ".archive/**"
  - "playground/**"
  - "use-cases/**"
  - "**/__pycache__/**"
  - "**/*.pyc"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.pdf"
  - "**/*.zip"
  - "**/*.svg"
  - "**/*.cast"
shared_files:
  - "pyproject.toml"
  - "requirements/requirements.txt"
  - "requirements/requirements-test.txt"
  - "requirements/requirements-dev.txt"
  - "Makefile"
  - ".release_review/PRE_RELEASE_REVIEW_TRACKING.md"
component_map:
  Public API + Safety:
    - "traigent/api/**/*.py"
    - "traigent/security/**/*.py"
    - "tests/**/api/**/*.py"
    - "tests/**/security/**/*.py"
    - "tests/**/*privacy*.py"
  Core Orchestration + Config:
    - "traigent/core/**/*.py"
    - "traigent/config/**/*.py"
    - "traigent/config_generator/**/*.py"
    - "traigent/cloud/**/*.py"
    - "traigent/cli/**/*.py"
    - "traigent/storage/**/*.py"
    - "traigent/providers/**/*.py"
    - "traigent/utils/**/*.py"
    - "traigent/tuned_variables/**/*.py"
    - "traigent/tvl/**/*.py"
    - "traigent/analytics/**/*.py"
    - "traigent/agents/**/*.py"
    - "traigent/traigent_client.py"
    - "traigent/__init__.py"
    - "traigent/_version.py"
    - "tests/**/core/**/*.py"
    - "tests/**/config/**/*.py"
    - "tests/**/config_generator/**/*.py"
    - "tests/**/cloud/**/*.py"
    - "tests/**/storage/**/*.py"
    - "tests/**/tuned_variables/**/*.py"
    - "tests/**/tvl/**/*.py"
    - "tests/**/utils/**/*.py"
    - "tests/test_backend_config.py"
    - "tests/unit/test_traigent_client*.py"
  Integrations + Invokers:
    - "traigent/integrations/**/*.py"
    - "traigent/invokers/**/*.py"
    - "traigent/hybrid/**/*.py"
    - "traigent/wrapper/**/*.py"
    - "traigent/hooks/**/*.py"
    - "tests/**/integrations/**/*.py"
    - "tests/**/invokers/**/*.py"
    - "tests/**/hybrid/**/*.py"
    - "tests/**/wrapper/**/*.py"
    - "tests/**/hooks/**/*.py"
    - "tests/unit/test_bridge_wrapper.py"
    - "tests/unit/test_hybrid_protocol_privacy.py"
  Optimizers + Evaluators:
    - "traigent/optimizers/**/*.py"
    - "traigent/evaluators/**/*.py"
    - "traigent/core/samplers/**/*.py"
    - "traigent/core/stat_significance.py"
    - "traigent/core/result_selection.py"
    - "tests/**/optimizers/**/*.py"
    - "tests/**/evaluators/**/*.py"
    - "tests/**/core/samplers/**/*.py"
    - "tests/**/core/test_stat_significance.py"
  Packaging + CI:
    - ".github/workflows/*.yml"
    - "pyproject.toml"
    - "requirements/**/*.txt"
    - "Makefile"
    - "uv.lock"
    - "pytest.ini"
    - "mypy.ini"
    - ".pre-commit-config.yaml"
    - "MANIFEST.in"
    - "scripts/**/*.py"
    - "scripts/**/*.sh"
  Docs + Release Ops:
    - "README.md"
    - "CHANGELOG.md"
    - "CONTRIBUTING.md"
    - "MAINTENANCE.md"
    - "docs/**/*.md"
    - "docs/**/*.yaml"
    - "docs/**/*.yml"
    - "docs/**/*.json"
    - ".release_review/**/*"
    - "tests/**/*.py"
    - "traigent_validation/**/*.py"
    - "examples/**/*"
    - "walkthrough/**/*"
    - "assets/**/*"
