version: 1
metadata:
  purpose: staged source-review contract for cost-controlled release review
  source_roots:
    - "traigent/**/*.py"
    - "traigent_validation/**/*.py"
global:
  default_review_mode: strict
  review_modes:
    strict:
      required_review_types:
        - primary
        - secondary
        - tertiary
        - reconciliation
      required_angles:
        - security_authz
        - correctness_regression
        - async_concurrency_performance
        - dto_api_contract
      allow_previous_artifact_reuse: true
      skip_if_file_unchanged_and_artifact_exists: true
      single_model: false
    quick:
      required_review_types:
        - primary
      required_angles:
        - security_authz
        - correctness_regression
        - async_concurrency_performance
      allow_previous_artifact_reuse: true
      skip_if_file_unchanged_and_artifact_exists: true
      single_model: true
  require_full_source_coverage: true
  source_inventory: inventories/source_files.txt
  required_review_types:
    - primary
    - secondary
    - tertiary
    - reconciliation
  per_file_matrix:
    enabled: true
    scope_inventory: inventories/source_files.txt
    required_review_types:
      - primary
      - secondary
      - tertiary
      - reconciliation
    required_angles:
      - security_authz
      - correctness_regression
      - async_concurrency_performance
      - dto_api_contract
    pass_rule: all_required_roles_must_pass
notes:
  - Exact file lists live in inventories because several review graphs intentionally split a package across multiple waves.
  - This supplements .release_review/scope.yml and does not reduce the broader release gate scope.
components:
  - id: public_api_contract
    wave: 1
    name: Public API Contract
    priority: P0
    required_for_ready: true
    inventory: inventories/priority_wave01_public_api_contract.txt
    approximate_files: 20
    approximate_lines: 11782
