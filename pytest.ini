[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    # Parallel execution: use all CPU cores (24) with pytest-xdist
    -n auto
    --dist loadgroup
    # Show progress for long-running test suites
    -v
    --ignore=demos
    --ignore=playground
    --ignore=plugins
    --ignore=tests/manual_validation
    --ignore=tests/legacy
    --ignore=tests/auto_tune
    # JS bridge tests must run via test_bridge_wrapper.py to avoid terminal crashes
    # These tests spawn Node.js processes that can crash VSCode terminals
    --ignore=tests/unit/bridges
    --ignore=tests/unit/test_bridge_wrapper.py
    --ignore=tests/unit/evaluators/test_js_evaluator.py
    --ignore=tests/unit/evaluators/test_js_evaluator_budget.py
    --ignore=tests/unit/evaluators/test_js_evaluator_stop_conditions.py
    # Known problematic tests: constraints_enforced hangs, litellm crashes with pydantic 2.12.x
    --ignore=tests/unit/core/test_constraints_enforced.py
    --ignore=tests/unit/evaluators/test_litellm_integration.py
    # Skip test_orchestrator.py which causes hangs at ~33% (see MEMORY.md)
    --ignore=tests/unit/core/test_orchestrator.py
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    e2e: marks tests as end-to-end tests
    slow: marks tests as slow (deselect with '-m "not slow"')
    asyncio: marks tests as async tests
    analytics: marks tests as analytics tests
    security: marks tests as security tests
    timeout: marks tests that expect a timeout decorator (registered for discovery tools)
    rate_limit: marks tests for rate limit handling behavior
    chaos: marks chaos/fault injection tests (slow, may be flaky)
    contract: marks contract tests against real APIs (requires credentials)
