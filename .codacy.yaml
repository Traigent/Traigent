---
include_paths:
  - "**/*.py"
  - "**/*.sql"
  - "**/*.sh"
  - "**/*.yaml"
  - "**/*.yml"
exclude_paths:
  - ".codacy/logs/**"
  - ".cache/**"
  - ".venv/**"
  - "venv/**"
  - "logs/**"
  - "reports/**"
  - "scripts/archive/**"
  - "scripts/development/**"
  - "scripts/maintenance/**"
  - "scripts/smoke/**"
  - "scripts/validation/**"
  - "tests/legacy/**"
  - "node_modules/**"
  - "instance/**"
  - "storage/**"
  - "**/*.log"
  - "**/*.db"
  - "**/__pycache__/**"
