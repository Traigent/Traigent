# SonarQube Local Configuration for Traigent SDK
# This file is for local scanning - do NOT commit to version control

# Server connection
sonar.host.url=http://localhost:9000
sonar.projectKey=TraigentSDK
sonar.projectName=Traigent SDK

# Authentication - set SONAR_LOCAL_TOKEN env var or uncomment and add token
# sonar.token=your_token_here

# Source directories
sonar.sources=traigent

# Exclusions - skip non-source files
sonar.exclusions=**/__pycache__/**,**/venv/**,**/*.pyc,**/build/**,**/dist/**,**/tests/**,.pytest_cache/**,docs/**,examples/**,tmp/**,.scannerwork/**,scripts/**,walkthrough/**

# Python version
sonar.python.version=3.11

# File encoding
sonar.sourceEncoding=UTF-8

# Coverage report (optional - uncomment if using pytest-cov)
# sonar.python.coverage.reportPaths=coverage.xml

# Test report (optional - uncomment if using pytest)
# sonar.python.xunit.reportPath=test-results.xml
