# Pre-commit hooks for Traigent SDK
# Install: pip install pre-commit && pre-commit install

repos:
  # Python import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  # Python code formatting
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3.12
        files: ^traigent/

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
        args: [--fix]
        files: ^traigent/

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: .*\.lock$|package-lock\.json$|.*\.example$|\.secrets\.baseline$|\.venv/

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^scripts/config/mkdocs\.yml$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: ["-ll", "-r", "traigent/"]
        pass_filenames: false
        exclude: ^tests/

  # Type checking - uses pyproject.toml [tool.mypy] configuration
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        args:
          - --config-file=pyproject.toml
        pass_filenames: false
        additional_dependencies:
          - types-PyYAML
          - types-bleach
          - types-requests

  # TVL specification validation (G-2)
  - repo: local
    hooks:
      - id: validate-tvl-specs
        name: Validate TVL specs
        entry: python -m traigent.tvl --strict
        language: python
        files: '\.tvl\.ya?ml$'
        types: [file]
        additional_dependencies: ['pyyaml>=6.0']

  # Prevent committing gitignored files
  - repo: local
    hooks:
      - id: check-cost-strictness
        name: Check strict cost accounting guardrails
        language: script
        entry: scripts/hooks/check-cost-strictness.sh
        pass_filenames: false
        always_run: true
      - id: check-dep-floor-drift
        name: Check dependency floor drift between pyproject.toml and requirements/
        language: python
        entry: python scripts/ci/check_dep_floor_drift.py
        pass_filenames: false
        files: '^(pyproject\.toml|requirements/.*\.txt)$'
      - id: check-ignored-files
        name: Check for ignored files staged for commit
        language: script
        entry: scripts/hooks/check-ignored-files.sh
        pass_filenames: false
        always_run: true

# Configuration for detect-secrets
# Run: detect-secrets scan > .secrets.baseline
# to create initial baseline
