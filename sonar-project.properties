# SonarQube Local Project Configuration
# For local analysis (matches Traigent Python SDK pattern)

sonar.host.url=http://localhost:9000
sonar.projectKey=traigent-js-local
sonar.projectName=Traigent JS SDK (Local)
sonar.projectVersion=0.1.0

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.d.ts,**/demos/**,**/examples/**

# TypeScript/JavaScript configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage exclusions (same as vitest config)
sonar.coverage.exclusions=**/index.ts,src/integrations/openai/**,src/integrations/vercel-ai/**,src/cli/runner.ts
