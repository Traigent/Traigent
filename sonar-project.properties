sonar.host.url=https://sonarcloud.io
sonar.projectKey=Traigent_traigent-js
sonar.organization=traigent
sonar.projectName=traigent-js
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8
sonar.branch.longLivedBranchesPattern=main|master|develop

sonar.sources=src
sonar.tests=tests,src
sonar.test.inclusions=src/**/*.test.ts,tests/**/*.test.ts
sonar.typescript.tsconfigPath=tsconfig.sonar.json

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=
  dist/**,
  node_modules/**,
  coverage/**,
  docs/**,
  demos/**,
  examples/**,
  walkthrough/**,
  **/*.d.ts

sonar.coverage.exclusions=
  **/*.test.ts,
  tests/**,
  src/**/index.ts,
  src/cli/runner.ts

sonar.cpd.exclusions=
  **/*.test.ts,
  tests/**
