version: '3.8'

services:
  # Development environment with all dependencies
  dev:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
    environment:
      - TRAIGENT_MOCK_LLM=true
      - TRAIGENT_OFFLINE_MODE=true
      - TRAIGENT_LOG_LEVEL=DEBUG
    command: ["bash"]
    stdin_open: true
    tty: true

  # Run tests
  test:
    build:
      context: .
      target: testing
    volumes:
      - .:/app
    environment:
      - TRAIGENT_MOCK_LLM=true
      - TRAIGENT_OFFLINE_MODE=true
    command: ["pytest", "tests/", "-v", "--tb=short"]

  # Run unit tests only (faster)
  test-unit:
    build:
      context: .
      target: testing
    volumes:
      - .:/app
    environment:
      - TRAIGENT_MOCK_LLM=true
      - TRAIGENT_OFFLINE_MODE=true
    command: ["pytest", "tests/unit/", "-v", "--tb=short"]

  # Run linting
  lint:
    build:
      context: .
      target: development
    volumes:
      - .:/app
    command: ["make", "lint"]

  # Run formatting
  format:
    build:
      context: .
      target: development
    volumes:
      - .:/app
    command: ["make", "format"]

  # Interactive Python shell with traigent loaded
  shell:
    build:
      context: .
      target: development
    volumes:
      - .:/app
    environment:
      - TRAIGENT_MOCK_LLM=true
      - TRAIGENT_OFFLINE_MODE=true
    command: ["python", "-c", "import traigent; import IPython; IPython.embed()"]
    stdin_open: true
    tty: true

  # Streamlit playground
  playground:
    build:
      context: .
      target: development
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    environment:
      - TRAIGENT_MOCK_LLM=true
      - TRAIGENT_OFFLINE_MODE=true
    # NOTE: playground moved to TraigentDemo repository
    command: ["echo", "Playground moved to TraigentDemo. Run: cd ../TraigentDemo && streamlit run examples/playground/traigent_control_center.py"]

volumes:
  pip-cache:
