# TVL 0.9 Example: Promotion Policy
# Demonstrates statistical promotion with multiple objectives

spec:
  id: promotion-policy-example
  version: 0.1.0

metadata:
  owner: "team@example.com"
  description: "Example demonstrating promotion policy configuration"

# TVL 0.9 typed variables
tvars:
  - name: model
    type: enum[str]
    domain: ["gpt-4o-mini", "gpt-4o", "claude-3-haiku-20240307"]

  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]

  - name: max_tokens
    type: enum[int]
    domain: [256, 512, 1024]

objectives:
  - name: task_accuracy
    direction: maximize
    weight: 2.0

  - name: response_latency
    direction: minimize
    weight: 1.0

  - name: cost_per_request
    direction: minimize
    weight: 1.0

  - name: safety_score
    direction: maximize
    weight: 1.5

# TVL 0.9 promotion policy
promotion_policy:
  alpha: 0.05
  min_effect:
    task_accuracy: 0.02
    response_latency: 50.0
    cost_per_request: 0.001
    safety_score: 0.01
  dominance: epsilon_pareto
  adjust: BH

# Exploration settings
exploration:
  strategy: pareto_optimal
  budgets:
    max_trials: 50
    timeout_seconds: 1800

constraints:
  structural:
    - when: 'params.model == "gpt-4o"'
      then: 'params.max_tokens <= 512'
      id: premium-token-limit
      error_message: "Premium models have token limits"
