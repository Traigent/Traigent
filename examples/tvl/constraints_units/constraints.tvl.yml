# TVL 0.9 Example: Constraints Lab
#
# Explores CEL constraints and unit typing.
# Migrated from legacy format to TVL 0.9.

spec:
  id: constraints-lab
  version: "0.1.0"

metadata:
  owner: "qa@traigent.ai"
  description: "Explores CEL constraints and unit typing."

# TVL 0.9 typed variables (replaces configuration_space)
tvars:
  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]
    default: 0.5
    unit: dimensionless

  - name: max_tokens
    type: int
    domain:
      range: [128, 1024]
    default: 512
    unit: tokens

  - name: cache_ttl_hours
    type: float
    domain:
      range: [0.5, 12.0]
    default: 2.0
    unit: hours

  - name: rerank_weight
    type: float
    domain:
      range: [0.0, 1.0]
    default: 0.5
    unit: dimensionless

objectives:
  - name: stability
    direction: maximize

  - name: cost
    direction: minimize

# TVL 0.9 structural constraints (replaces flat constraints list)
constraints:
  structural:
    # Expression constraint: simple rule
    - expr: "params.cache_ttl_hours >= 1.0"

    # Expression constraint: compound expression
    - expr: "params.temperature * params.max_tokens <= 600"

    # Conditional constraint: when-then pattern
    - when: "params.max_tokens >= 512"
      then: "params.rerank_weight >= 0.4"

    # Forbidden constraint as expression (rerank_weight > 0.8 is forbidden)
    - expr: "params.rerank_weight <= 0.8"

evaluation:
  workloads:
    - name: stability_suite
      dataset: dvl://qa/stability-suite
  metrics:
    stability:
      aggregation: mean
    cost:
      aggregation: mean
