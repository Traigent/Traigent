spec:
  id: overlays-fleet
  version: 0.2.0
metadata:
  owner: "platform@traigent.ai"
  description: "Shows how extends/overrides manage environments."
units:
  time: [milliseconds, seconds]
  ratio: [dimensionless]
  currency: [USD]
configuration_space:
  model:
    type: categorical
    values: ["gpt-4o-mini", "claude-3-sonnet", "claude-3-haiku"]
  temperature:
    type: continuous
    range: [0.2, 0.9]
    unit: ratio
  max_tokens:
    type: integer
    range: [128, 1024]
    unit: tokens
  reranker:
    type: categorical
    values: ["e5-large", "voyage-2", "semantic-router"]
objectives:
  - name: helpfulness
    direction: maximize
  - name: latency
    direction: minimize
  - name: cost
    direction: minimize
optimization:
  strategy: pareto_optimal
  budget:
    max_trials:
      value: 80
      unit: count
    parallel_trials: 8
    timeout_seconds: 3600

# Environment-specific overrides
environments:
  staging:
    overrides:
      configuration_space:
        model:
          values: ["gpt-4o-mini", "claude-3-haiku"]
        temperature:
          range: [0.2, 0.6]
      optimization:
        budget:
          max_trials:
            value: 30
            unit: count

  production:
    extends: staging  # Inherit from staging
    overrides:
      configuration_space:
        max_tokens:
          range: [256, 768]
      objectives:
        - name: latency
          threshold:
            value: 750
            unit: milliseconds
      promotion:
        gate: strict_dominance

constraints:
  - id: premium-model-reranker
    type: conditional
    when: 'params.model == "claude-3-sonnet"'
    then: 'params.reranker in ["voyage-2", "semantic-router"]'
    error_message: "Premium models require smarter reranking."

triagent:
  pipeline: SupportChat
  deployment_targets: ["staging", "production"]
