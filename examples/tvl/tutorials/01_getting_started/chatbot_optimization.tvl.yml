# TVL 0.9 Tutorial: Getting Started
#
# This is your first TVL spec! TVL (Tuned Variables Language) is a declarative
# way to define what parameters to optimize in your LLM application.
#
# In this example, we'll optimize a simple chatbot for:
# - Response quality (maximize)
# - Response latency (minimize)
#
# Run with: traigent optimize --spec chatbot_optimization.tvl.yml

spec:
  id: chatbot-quickstart
  version: "1.0"

metadata:
  owner: team@example.com
  description: Simple chatbot optimization - your first TVL spec!
  tags:
    - tutorial
    - beginner

# TVL 0.9 uses 'tvars' (tuned variables) with explicit types and domains
# This is more expressive than the legacy 'configuration_space' format
tvars:
  # Enum type: choose from a fixed set of values
  - name: model
    type: enum[str]
    domain: ["gpt-4o-mini", "gpt-3.5-turbo"]
    default: "gpt-4o-mini"

  # Float type with a continuous range
  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]
      resolution: 0.1  # Optional: discretize for faster search
    default: 0.7

  # Integer type with a range
  - name: max_tokens
    type: int
    domain:
      range: [128, 512]
    default: 256

# Define what we're optimizing for
objectives:
  - name: response_quality
    direction: maximize
    weight: 1.0

  - name: latency_ms
    direction: minimize
    unit: ms
    weight: 0.5

# Simple constraints on the search space
constraints:
  structural:
    # Keep temperature reasonable for production
    - expr: "params.temperature <= 0.9"

# Exploration settings
exploration:
  budgets:
    max_trials: 20
    max_wallclock_s: 600
