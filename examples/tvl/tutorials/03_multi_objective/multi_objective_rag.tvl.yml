# TVL 0.9 Tutorial: Multi-Objective Optimization
#
# Real-world LLM applications have multiple competing objectives:
# - Quality vs Cost
# - Accuracy vs Latency
# - Safety vs Helpfulness
#
# This tutorial demonstrates multi-objective optimization with:
# - Weighted objectives
# - Epsilon-Pareto dominance
# - Constraint handling

spec:
  id: multi-objective-rag
  version: "1.0"

metadata:
  owner: tutorials@traigent.ai
  description: Multi-objective optimization for production RAG
  tags:
    - tutorial
    - multi-objective
    - production

# Environment configuration (for derived constraints)
environment:
  snapshot_id: "2025-01-15T00:00:00Z"
  components:
    price_catalog:
      gpt-4o: 0.005
      gpt-4o-mini: 0.00015
      gpt-3.5-turbo: 0.0005
    quotas:
      daily_budget_usd: 50.0
      max_requests_per_minute: 100

tvars:
  - name: model
    type: enum[str]
    domain: ["gpt-4o", "gpt-4o-mini", "gpt-3.5-turbo"]
    default: "gpt-4o-mini"

  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]
    default: 0.7

  - name: max_tokens
    type: int
    domain:
      range: [256, 2048]
    default: 512

  - name: retrieval_k
    type: int
    domain:
      range: [3, 10]
    default: 5

  - name: use_cot
    type: bool
    default: false

# Multi-objective configuration with weights
# Weights influence the search direction but don't eliminate trade-offs
objectives:
  # Primary objective: answer quality
  - name: answer_accuracy
    direction: maximize
    weight: 1.0  # Highest priority

  # Secondary: response consistency
  - name: consistency_score
    direction: maximize
    weight: 0.8

  # Tertiary: latency (user experience)
  - name: latency_ms
    direction: minimize
    unit: ms
    weight: 0.6

  # Quaternary: cost efficiency
  - name: cost_per_query
    direction: minimize
    unit: USD
    weight: 0.4

# Constraints define the feasible region
constraints:
  structural:
    # Model-specific constraints
    - when: "params.model == 'gpt-3.5-turbo'"
      then: "params.max_tokens <= 1024"

    - when: "params.model == 'gpt-4o'"
      then: "params.use_cot == true"  # Use CoT for expensive model

    # General constraints
    - expr: "params.retrieval_k >= 3"
    - expr: "params.temperature <= 0.9"

  # Derived constraints (evaluated with environment)
  derived:
    - require: "env.daily_budget_usd >= cost_per_query * 1000"
      description: "Budget sufficient for minimum daily volume"

    - require: "env.max_requests_per_minute >= 10"
      description: "Rate limit allows minimum throughput"

# Promotion policy: how we decide if a new config is better
promotion_policy:
  # Epsilon-Pareto dominance: must be better by at least epsilon
  dominance: epsilon_pareto

  # Significance level for statistical tests
  alpha: 0.05

  # Minimum meaningful improvement per objective
  min_effect:
    answer_accuracy: 0.02      # 2% accuracy improvement
    consistency_score: 0.01    # 1% consistency improvement
    latency_ms: 50.0           # 50ms latency reduction
    cost_per_query: 0.0001     # $0.0001 cost reduction

  # Multiple testing correction
  adjust: BH  # Benjamini-Hochberg

# Exploration strategy
exploration:
  strategy:
    type: nsga2  # Non-dominated Sorting Genetic Algorithm
    initial_sampling: sobol
  parallelism:
    max_parallel_trials: 4
  convergence:
    metric: hypervolume_improvement
    window: 20
    threshold: 0.001
  budgets:
    max_trials: 100
    max_spend_usd: 25.0
    max_wallclock_s: 3600
