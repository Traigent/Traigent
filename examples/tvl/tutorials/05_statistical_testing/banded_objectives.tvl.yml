# TVL 0.9 Tutorial: Banded Objectives with TOST
#
# Sometimes you don't want to maximize or minimize a metric - you want
# to keep it within a target band. This is common for:
#
# - Response time SLOs (e.g., p99 latency between 100-200ms)
# - Cost budgets (keep cost within $X-$Y per query)
# - Quality thresholds (maintain accuracy in 85-95% range)
#
# TVL 0.9 supports banded objectives with TOST (Two One-Sided Tests)
# for statistical equivalence testing.

spec:
  id: banded-objectives-demo
  version: "1.0"

metadata:
  owner: tutorials@traigent.ai
  description: Demonstrates banded objectives and TOST
  tags:
    - tutorial
    - banded-objectives
    - tost

tvars:
  - name: model
    type: enum[str]
    domain: ["gpt-4o-mini", "gpt-3.5-turbo"]
    default: "gpt-4o-mini"

  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]
    default: 0.7

  - name: max_tokens
    type: int
    domain:
      range: [256, 1024]
    default: 512

# Mix of standard and banded objectives
# Note: Banded objectives are evaluated programmatically using
# BandedObjectiveSpec - the YAML format uses standard objectives
# and the band configuration is applied in code.
objectives:
  # Standard maximize objective
  - name: task_accuracy
    direction: maximize
    weight: 1.0

  # Standard minimize objective
  - name: latency_ms
    direction: minimize
    unit: ms
    weight: 0.5

  # This could be a banded objective in code:
  # Target band: [0.85, 0.95] - we want consistency in this range
  - name: response_consistency
    direction: maximize
    weight: 0.8

  # This could be a banded objective in code:
  # Target band: [$0.0001, $0.0005] - keep cost in budget
  - name: cost_per_query
    direction: minimize
    unit: USD
    weight: 0.3

constraints:
  structural:
    - expr: "params.temperature <= 0.9"

# Promotion policy
promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    task_accuracy: 0.02
    latency_ms: 20.0
    response_consistency: 0.01
    cost_per_query: 0.00005
  adjust: BH

exploration:
  budgets:
    max_trials: 50
    max_wallclock_s: 1800
