# TVL 0.9 Example: Banded Objectives
# Demonstrates banded objectives with TOST testing

spec:
  id: banded-objectives-example
  version: 0.1.0

metadata:
  owner: "team@example.com"
  description: "Example demonstrating banded objectives"

# TVL 0.9 typed variables
tvars:
  - name: model
    type: enum[str]
    domain: ["gpt-4o-mini", "claude-3-haiku-20240307"]

  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]

# Mix of standard and banded objectives
objectives:
  - name: task_quality
    direction: maximize

  - name: response_consistency
    band:
      target: [0.85, 0.95]
      test: TOST
      alpha: 0.05

  - name: cost_per_query
    band:
      target:
        center: 0.01
        tol: 0.005
      test: TOST
      alpha: 0.05

promotion_policy:
  alpha: 0.05
  dominance: epsilon_pareto

exploration:
  strategy: pareto_optimal
  budgets:
    max_trials: 40
