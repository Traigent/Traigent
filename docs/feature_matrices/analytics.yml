# Critical Gaps - Thread Safety
critical_gaps:
  - id: GAP-ANALYTICS-001
    type: behavior
    name: "Missing thread-safety across analytics modules"
    priority: critical
    severity: high
    description: |
      9 classes have mutable state (history dicts/lists) that can be
      modified concurrently without any thread protection. This can lead
      to race conditions, data corruption, and undefined behavior.
    affected_classes:
      - CostOptimizationAI (cost_optimization.py)
      - ResourceOptimizer (cost_optimization.py)
      - PerformanceMonitor (anomaly.py)
      - AlertManager (anomaly.py)
      - CostAnalysisEngine (intelligence.py)
      - CostOptimizationAI (intelligence.py)
      - SmartScheduler (scheduling.py)
      - OptimizationHistory (meta_learning.py)
    recommendation: |
      Add threading.Lock() to each class with mutable state.
      Example:
        def __init__(self):
            self._lock = threading.Lock()
            self.usage_history = {}

        def record_usage(self, usage):
            with self._lock:
                self.usage_history[...] = ...

  - id: GAP-ANALYTICS-002
    type: pattern
    name: "Inconsistent size limits"
    priority: medium
    status: RESOLVED
    resolution_date: "2025-12-04"
    description: "Size limits now standardized using core/constants.py"
    implementation: |
      All history collections now use centralized constants:
      - MAX_USAGE_HISTORY_SIZE (10000) for high-frequency usage data
      - MAX_PERFORMANCE_HISTORY_SIZE (1000) for performance metrics
      - MAX_OPTIMIZATION_HISTORY_SIZE (1000) for optimization records
      - HISTORY_PRUNE_RATIO (0.1) for consistent pruning behavior
    affected_classes:
      - PerformanceMonitor: uses MAX_PERFORMANCE_HISTORY_SIZE
      - RegressionDetector: uses MAX_REGRESSION_HISTORY_SIZE
      - AlertManager: uses MAX_ALERT_HISTORY_SIZE
      - BudgetAllocator: uses MAX_OPTIMIZATION_HISTORY_SIZE
      - CostOptimizationAI: uses MAX_USAGE_HISTORY_SIZE
      - ResourceOptimizer: uses MAX_USAGE_HISTORY_SIZE
      - CostAnalysisEngine: uses MAX_USAGE_HISTORY_SIZE
      - SmartScheduler: uses MAX_OPTIMIZATION_HISTORY_SIZE
      - OptimizationHistory: uses MAX_OPTIMIZATION_HISTORY_SIZE
      - CostForecaster: uses MAX_USAGE_HISTORY_SIZE
      - PerformanceForecaster: uses MAX_PERFORMANCE_HISTORY_SIZE
      - TrendAnalyzer: uses MAX_PERFORMANCE_HISTORY_SIZE

