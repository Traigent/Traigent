# Summary Statistics
# Note: BayesianOptimizer and all Optuna-based optimizers are cloud-only and not locally available.
summary:
  total_implementations: 15
  local_complete: 8   # RandomSearch, Grid, Remote, Cloud(interface), ParallelBatch, MultiObjectiveBatch, AdaptiveBatch, Interactive
  cloud_only: 7       # Bayesian, OptunaBase, OptunaTPE, OptunaRandom, OptunaCMAES, OptunaNSGAII, OptunaGrid (all local files deleted)
  partial: 0
  missing: 0

# Feature Support Matrix
feature_support:
  async_methods:
    # Note: BayesianOptimizer and all Optuna variants are cloud-only; local entries only below.
    full_support:
      - RemoteOptimizer (traigent/optimizers/remote.py)
      - CloudOptimizer interface methods (traigent/optimizers/cloud_optimizer.py)
    uses_default:
      - RandomSearchOptimizer
      - GridSearchOptimizer
      - All Batch optimizers
      - InteractiveOptimizer

  checkpoint_support:
    # Note: Optuna-based checkpoint support is cloud-only.
    full_support: []
    partial_support: []
    not_supported:
      - RandomSearchOptimizer
      - GridSearchOptimizer
      - RemoteOptimizer
      - CloudOptimizer
      - Batch optimizers
      - InteractiveOptimizer

  multi_objective:
    # Note: OptunaNSGAII and OptunaTPE are cloud-only.
    full_support:
      - MultiObjectiveBatchOptimizer
    partial_support: []
    not_supported:
      - RandomSearchOptimizer
      - GridSearchOptimizer

# Identified Gaps
identified_gaps:
  - id: GAP-OPT-001
    type: pattern
    name: "Inconsistent async support"
    priority: medium
    description: "Local optimizers use default base class async methods instead of true async"
    affected:
      - RandomSearchOptimizer
      - GridSearchOptimizer
      - All batch optimizers

  - id: GAP-OPT-002
    type: behavior
    name: "Missing checkpoint support"
    priority: low
    description: "Local optimizers do not support checkpoint/restore (Optuna-based checkpoint support is cloud-only)"
    affected:
      - RandomSearchOptimizer
      - GridSearchOptimizer
      - RemoteOptimizer
