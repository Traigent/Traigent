# Optimizer Feature Matrix
# Traceability: CONC-Layer-Core CONC-Quality-Maintainability FUNC-OPT-ALGORITHMS REQ-OPT-ALG-004 REQ-TRACE-GAP-004
#
# This matrix tracks the public optimizer surface. Local SDK execution exposes
# grid and random. Smart strategies are backend-routed capabilities and are not
# registered as local Python optimizers.

id: MATRIX-OPTIMIZERS
module_type: optimizer
requirement: REQ-OPT-ALG-004
last_updated: "2026-05-31"
description: "Optimization algorithm implementations and backend-routed strategy coverage"

base_contract:
  class: BaseOptimizer
  code_unit: traigent/optimizers/base.py
  required_methods:
    - name: suggest_next_trial
      signature: "(self, history: list[TrialResult]) -> dict[str, Any]"
      description: "Suggest next local configuration to evaluate"

    - name: should_stop
      signature: "(self, history: list[TrialResult]) -> bool"
      description: "Determine if local optimization should stop"

  optional_methods:
    - name: suggest_next_trial_async
      signature: "(self, history, remote_context) -> dict[str, Any]"
      description: "Async version for remote service support"
      default_behavior: "Calls sync version"

    - name: should_stop_async
      signature: "(self, history, remote_context) -> bool"
      description: "Async version for remote service support"
      default_behavior: "Calls sync version"

    - name: generate_candidates
      signature: "(self, max_candidates: int) -> list[dict]"
      description: "Generate multiple candidate configurations"
      default_behavior: "Iterates suggest_next_trial"

    - name: generate_candidates_async
      signature: "(self, max_candidates, remote_context) -> list[dict]"
      description: "Async version of generate_candidates"
      default_behavior: "Iterates suggest_next_trial_async"

    - name: reset
      signature: "(self) -> None"
      description: "Reset optimizer state for new run"
      default_behavior: "Clears trial_count, best_score, best_config"

    - name: get_algorithm_info
      signature: "(self) -> dict[str, Any]"
      description: "Get algorithm metadata"
      default_behavior: "Returns class info dict"

capabilities:
  # ---------- Local Optimizers ----------
  - id: CAP-OPT-RANDOM
    name: "Random Search Optimizer"
    description: "Random sampling from configuration space"
    route: local
    public_registry_ids: ["random"]
    implementations:
      - class_name: RandomSearchOptimizer
        code_unit: traigent/optimizers/random.py
        status: complete
        completion: 1.0
        implemented_methods:
          - suggest_next_trial
          - should_stop
        notes: "Default local optimizer; supports finite and continuous ranges"

  - id: CAP-OPT-GRID
    name: "Grid Search Optimizer"
    description: "Exhaustive grid search over finite configuration spaces"
    route: local
    public_registry_ids: ["grid"]
    implementations:
      - class_name: GridSearchOptimizer
        code_unit: traigent/optimizers/grid.py
        status: complete
        completion: 1.0
        implemented_methods:
          - suggest_next_trial
          - should_stop
        notes: "Default local optimizer; deterministic Cartesian-product iteration"

  # ---------- Backend-Routed Smart Strategies ----------
  - id: CAP-OPT-BACKEND-SMART
    name: "Backend-Routed Smart Strategies"
    description: "Managed smart optimization strategies discovered through backend routing"
    route: backend
    public_strategy_ids:
      - bayesian
      - tpe
      - hyperband
      - frontier_scout
    implementations:
      - class_name: "Backend capability metadata"
        code_unit: traigent/optimizers/registry.py
        status: complete
        completion: 1.0
        implemented_methods:
          - list_backend_routed_optimizers
        notes: "Discoverable only when backend smart strategy flags are enabled; no local Python optimizer is registered"

  # ---------- Remote/Cloud Optimizers ----------
  - id: CAP-OPT-REMOTE
    name: "Remote Optimizer"
    description: "Remote optimization service client"
    route: remote
    implementations:
      - class_name: RemoteOptimizer
        code_unit: traigent/optimizers/remote.py
        status: complete
        completion: 1.0
        implemented_methods:
          - suggest_next_trial
          - suggest_next_trial_async
          - should_stop
          - should_stop_async
        notes: "Remote service client with async support"

  - id: CAP-OPT-CLOUD
    name: "Cloud Optimizer"
    description: "Cloud-backed optimizer with async support"
    route: backend
    implementations:
      - class_name: CloudOptimizer
        code_unit: traigent/optimizers/cloud_optimizer.py
        status: complete
        completion: 1.0
        implemented_methods:
          - suggest_next_trial
          - suggest_next_trial_async
          - should_stop
          - should_stop_async
        notes: "Async API for managed orchestration"

  # ---------- Batch/Parallel Optimizers ----------
  - id: CAP-OPT-PARALLEL-BATCH
    name: "Parallel Batch Optimizer"
    description: "Parallel evaluation of configuration batches"
    route: local
    implementations:
      - class_name: ParallelBatchOptimizer
        code_unit: traigent/optimizers/batch_optimizers.py
        status: complete
        completion: 1.0
        implemented_methods:
          - suggest_next_trial
          - should_stop
          - generate_candidates
        notes: "Parallel batch processing with worker pool"

  - id: CAP-OPT-MULTI-OBJECTIVE
    name: "Multi-Objective Batch Optimizer"
    description: "Pareto-aware multi-objective batch optimization"
    route: local
    implementations:
      - class_name: MultiObjectiveBatchOptimizer
        code_unit: traigent/optimizers/batch_optimizers.py
        status: complete
        completion: 1.0
        notes: "Supports multiple objectives with Pareto front tracking"

  - id: CAP-OPT-ADAPTIVE
    name: "Adaptive Batch Optimizer"
    description: "Self-adjusting batch optimization"
    route: local
    implementations:
      - class_name: AdaptiveBatchOptimizer
        code_unit: traigent/optimizers/batch_optimizers.py
        status: complete
        completion: 1.0
        notes: "Dynamically adjusts batch size based on progress"

  - id: CAP-OPT-INTERACTIVE
    name: "Interactive Optimizer"
    description: "Human-in-the-loop optimization"
    route: local
    implementations:
      - class_name: InteractiveOptimizer
        code_unit: traigent/optimizers/interactive_optimizer.py
        status: complete
        completion: 1.0
        notes: "Supports user feedback during optimization"

summary:
  total_implementations: 9
  complete: 9
  partial: 0
  missing: 0
  coverage_percentage: 100.0

feature_support:
  local_default_surface:
    full_support:
      - RandomSearchOptimizer
      - GridSearchOptimizer
    not_in_local_registry:
      - bayesian
      - tpe
      - hyperband
      - frontier_scout

  backend_routing:
    full_support:
      - bayesian
      - tpe
      - hyperband
      - frontier_scout
    notes: "Backend-routed strategy ids are discoverable only when explicitly enabled."

  async_methods:
    full_support:
      - RemoteOptimizer
      - CloudOptimizer
    uses_default:
      - RandomSearchOptimizer
      - GridSearchOptimizer
      - All batch optimizers
      - InteractiveOptimizer

  checkpoint_support:
    full_support:
      - RemoteOptimizer
      - CloudOptimizer
    backend_owned:
      - bayesian
      - tpe
      - hyperband
      - frontier_scout
    not_supported:
      - RandomSearchOptimizer
      - GridSearchOptimizer
      - Batch optimizers
      - InteractiveOptimizer

  multi_objective:
    full_support:
      - MultiObjectiveBatchOptimizer
      - frontier_scout
    backend_owned:
      - bayesian
      - tpe
      - hyperband
    not_supported:
      - RandomSearchOptimizer
      - GridSearchOptimizer

identified_gaps:
  - id: GAP-OPT-001
    type: pattern
    name: "Inconsistent async support"
    priority: medium
    description: "Most local optimizers use default base class async methods instead of true async"
    affected:
      - RandomSearchOptimizer
      - GridSearchOptimizer
      - All batch optimizers

  - id: GAP-OPT-002
    type: behavior
    name: "Backend capability observability"
    priority: low
    description: "Backend-routed smart strategy availability should be surfaced with backend health metadata when managed routing is active"
    affected:
      - bayesian
      - tpe
      - hyperband
      - frontier_scout
