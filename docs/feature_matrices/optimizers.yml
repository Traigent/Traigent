# Optimizer Feature Matrix
# Traceability: CONC-Layer-Core CONC-Quality-Maintainability FUNC-OPT-ALGORITHMS REQ-OPT-ALG-004 REQ-TRACE-GAP-004
#
# This matrix tracks implementation completeness for optimization algorithms.

id: MATRIX-OPTIMIZERS
module_type: optimizer
requirement: REQ-OPT-ALG-004
last_updated: "2026-01-01"
description: "Optimization algorithm implementations and their feature coverage"

base_contract:
  class: BaseOptimizer
  code_unit: traigent/optimizers/base.py
  required_methods:
    - name: suggest_next_trial
      signature: "(self, history: list[TrialResult]) -> dict[str, Any]"
      description: "Suggest next configuration to evaluate"

    - name: should_stop
      signature: "(self, history: list[TrialResult]) -> bool"
      description: "Determine if optimization should stop"

  optional_methods:
    - name: suggest_next_trial_async
      signature: "(self, history, remote_context) -> dict[str, Any]"
      description: "Async version for remote service support"
      default_behavior: "Calls sync version"

    - name: should_stop_async
      signature: "(self, history, remote_context) -> bool"
      description: "Async version for remote service support"
      default_behavior: "Calls sync version"

    - name: generate_candidates
      signature: "(self, max_candidates: int) -> list[dict]"
      description: "Generate multiple candidate configurations"
      default_behavior: "Iterates suggest_next_trial"

    - name: generate_candidates_async
      signature: "(self, max_candidates, remote_context) -> list[dict]"
      description: "Async version of generate_candidates"
      default_behavior: "Iterates suggest_next_trial_async"

    - name: reset
      signature: "(self) -> None"
      description: "Reset optimizer state for new run"
      default_behavior: "Clears trial_count, best_score, best_config"

    - name: get_algorithm_info
      signature: "(self) -> dict[str, Any]"
      description: "Get algorithm metadata"
      default_behavior: "Returns class info dict"

capabilities:
  # ---------- Standard Optimizers ----------
  - id: CAP-OPT-RANDOM
    name: "Random Search Optimizer"
    description: "Random sampling from configuration space"
    implementations:
      - class_name: RandomSearchOptimizer
        code_unit: traigent/optimizers/random.py
        status: complete
        completion: 1.0
        implemented_methods:
          - suggest_next_trial
          - should_stop
        notes: "Simple random sampling, uses base class defaults for async"

  - id: CAP-OPT-GRID
    name: "Grid Search Optimizer"
    description: "Exhaustive grid search over configuration space"
    implementations:
      - class_name: GridSearchOptimizer
        code_unit: traigent/optimizers/grid.py
        status: complete
        completion: 1.0
        implemented_methods:
          - suggest_next_trial
          - should_stop
        notes: "Cartesian product iteration, uses base class defaults for async"

  - id: CAP-OPT-BAYESIAN
    name: "Bayesian Optimizer"
    description: "Bayesian optimization with Gaussian Process — cloud only"
    availability: cloud-only
    implementations:
      - class_name: BayesianOptimizer
        code_unit: "(relocated to Traigent cloud; traigent/optimizers/bayesian.py deleted)"
        status: cloud-only
        completion: 0.0
        implemented_methods: []
        notes: "IP relocated to cloud. File deleted from local SDK. Raises OptimizationError directing users to the Traigent cloud."

