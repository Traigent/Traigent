spec:
  id: rag-campus-orientation
  version: 0.1.0
metadata:
  owner: "mlops@traigent.ai"
  description: >
    Adaptive RAG configuration for onboarding questions that drift with
    semester timelines, budgets, and latency promises.
  tags:
    - rag
    - campus
    - tvl-book
units:
  time: [milliseconds, seconds]
  currency: [USD]
  ratio: [dimensionless]
configuration_space:
  model:
    type: categorical
    values: ["gpt-4o-mini", "gpt-4o", "claude-3-haiku"]
  temperature:
    type: continuous
    range:
      min: 0.1
      max: 0.8
    unit: ratio
  max_tokens:
    type: discrete
    values: [256, 512, 768]
    unit: tokens
  retrieval_depth:
    type: integer
    range:
      min: 2
      max: 6
    unit: count
objectives:
  - name: answer_quality
    direction: maximize
  - name: response_latency
    direction: minimize
  - name: token_cost
    direction: minimize
optimization:
  strategy: pareto_optimal
  pareto_config:
    selection_method: crowding_distance
  budget:
    max_trials:
      value: 60
      unit: count
    parallel_trials: 6
    timeout_seconds: 2400
constraints:
  - id: campus-hour-latency
    type: expression
    rule: 'params.response_latency_ms <= 1200'
    error_message: "Keep responses under 1.2s during campus rush"
  - id: premium-model-budget
    type: conditional
    when: 'params.model == "gpt-4o"'
    then: 'params.token_cost_usd <= 0.04'
    error_message: "Premium models need budget guardrails"
environments:
  base:
    objectives:
      - name: response_latency
        threshold:
          value: 900
          unit: milliseconds
  finals_week:
    extends: base
    overrides:
      configuration_space:
        retrieval_depth:
          range:
            min: 3
            max: 8
      optimization:
        budget:
          max_trials:
            value: 90
            unit: count
evaluation:
  workloads:
    - name: onboarding_faq
      dataset: dvl://faq/onboarding
    - name: policy_changes
      dataset: dvl://faq/policy-2024
  metrics:
    answer_quality:
      aggregation: ndcg@10
    response_latency:
      aggregation: p95
    token_cost:
      aggregation: mean
promotion:
  gate: strict_dominance
  reviewers: ["ops@traigent.ai"]
triagent:
  pipeline: RAGOrientation
  deployment_targets: ["staging", "production"]
  manifest_output: artifacts/params.yaml
dvl:
  version: ">=0.4.0"
  drift_tests:
    - name: faq-topic-shift
      rule: 'metrics.topic_overlap >= 0.85'
