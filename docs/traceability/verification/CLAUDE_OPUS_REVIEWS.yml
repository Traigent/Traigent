  # --- OPERATION OP-005: doubleRelease ---
  - id: OP-005
    element: "doubleRelease operation"
    result: match
    verification:
      alloy_predicate: |
        pred doubleRelease[e: CostEnforcer, t: Time, tNext: Time, p: Permit] {
            -- Precondition: permit already released
            p not in e.active_permits[t] or p.active[t] = False

            -- Postcondition: state unchanged (idempotent)
            e.active_permits[tNext] = e.active_permits[t]
            e.in_flight_count[tNext] = e.in_flight_count[t]
            e.reserved_cost[tNext] = e.reserved_cost[t]
            e.accumulated_cost[tNext] = e.accumulated_cost[t]
            e.permit_counter[tNext] = e.permit_counter[t]
            p.active[tNext] = p.active[t]
        }
      python_code: |
        # In release_permit() at line 510:
        if not permit.mark_released():
            logger.warning("Double-release attempt for permit %d - ignoring", permit.id)
            return False
        # Returns early - no state modification

        # In track_cost() at line 706:
        permit_was_active = permit.mark_released()
        if not permit_was_active:
            logger.debug("Permit %d already released before track_cost...")
        # Continues but doesn't release reservation again
      correspondence: |
        1. Precondition matches: Alloy checks "p not in active_permits OR p.active=False",
           Python checks "not permit.mark_released()" which returns False when active=False
        2. Postcondition matches: Both leave all state unchanged on double-release
        3. Idempotency verified: Both implementations are idempotent
    notes: "Perfect correspondence. Double-release is safe and idempotent in both model and code."

  # --- PERMIT-001: Permit dataclass ---
  - id: PERMIT-001
    element: "Permit dataclass correspondence"
    result: match
    verification:
      alloy_sig: |
        sig Permit {
            id: one Int,
            amount: one Float,
            active: Time -> one Bool
        }
      python_class: |
        @dataclass
        class Permit:
            id: int           # Alloy: one Int
            amount: float     # Alloy: one Float
            active: bool = True  # Alloy: Time -> one Bool

            def mark_released(self) -> bool:
                if not self.active:
                    return False
                self.active = False
                return True
      correspondence: |
        1. id: int ↔ Int - MATCH (monotonic in Python, counter only increments)
        2. amount: float ↔ Float - MATCH (reserved cost amount)
        3. active: bool ↔ Bool - MATCH (Alloy uses Time -> Bool for temporal, Python uses mutable field)
        4. mark_released(): Implements single-release semantics (returns True once, then False)
        5. is_granted property: Returns True if amount > 0 and id >= 0
    notes: "All fields correspond. Python mark_released() ensures I5 invariant (single-release semantics)."

