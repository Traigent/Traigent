  # --- INV-008: permit sum equals reserved_cost ---
  - id: INV-008
    element: "I8: permit sum equals reserved_cost"
    result: match
    verification:
      alloy: |
        pred I8_PermitSumEqualsReserved[e: CostEnforcer, t: Time] {
            let permits = e.active_permits[t] |
