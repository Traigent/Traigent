            violations.append(f"I8 violated: sum(permit.amount) = {permit_sum:.4f} != reserved_cost = {self._reserved_cost:.4f}")
      correspondence: "Same condition with epsilon tolerance for floating point."
    notes: "NEW invariant discovered via Jackson methodology. Implemented in both model and code."

  # --- EDGE-001: Mock mode bypass ---
  - id: EDGE-001
    element: "Mock mode bypass"
    result: match
    verification:
      alloy: |
        pred mockModeBypass[e: CostEnforcer] {
            e.mock_mode = True implies {
                -- All operations are no-ops
                all t, tNext: Time | tNext = t.next implies {
                    e.accumulated_cost[tNext] = e.accumulated_cost[t]
                    e.reserved_cost[tNext] = e.reserved_cost[t]
                    e.in_flight_count[tNext] = e.in_flight_count[t]
                }
            }
        }
      python: |
        # In acquire_permit() at lines 461-463:
        if self.is_mock_mode:
            return Permit(id=0, amount=self._estimated_cost, active=True)

        # In release_permit() at lines 503-505:
        if self.is_mock_mode:
            permit.mark_released()
            return True

        # In track_cost() at lines 697-699:
        if self.is_mock_mode:
            permit.mark_released()
            return
      correspondence: "Both bypass all state mutations when mock_mode is True."
    notes: "Mock mode returns early without modifying _accumulated_cost, _reserved_cost, etc."

