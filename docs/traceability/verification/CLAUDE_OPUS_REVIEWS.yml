            self._in_flight_count += 1
            self._reserved_cost += reserved_amount
            ...
      correspondence: |
        Alloy's sequential time model (t -> t.next) corresponds to Python's RLock serialization.
        Both ensure operations are atomic and non-interleaved.
    notes: "Valid correspondence. RLock serializes concurrent operations into sequential time steps."

