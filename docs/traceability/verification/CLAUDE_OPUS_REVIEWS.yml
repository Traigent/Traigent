  # --- INV-003: active_permits equals in_flight_count ---
  - id: INV-003
    element: "I3: active_permits equals in_flight_count"
    result: match
    verification:
      alloy: "pred I3_ActiveEqualsInFlight[e: CostEnforcer, t: Time] { #(e.active_permits[t]) = e.in_flight_count[t] }"
      python: |
        # In _verify_invariants() at lines 968-974:
        active_count = len(self._active_permits)
        if active_count != self._in_flight_count:
            violations.append(f"I3 violated: len(active_permits) = {active_count} != in_flight_count = {self._in_flight_count}")
      correspondence: "Same condition: len(active_permits) == in_flight_count. Both modified atomically under lock."
    notes: "Exact correspondence. Atomicity enforced by single RLock in Python."

  # --- INV-004: budget bound ---
  - id: INV-004
    element: "I4: budget bound"
    result: match
    verification:
      alloy: |
        pred I4_BudgetBound[e: CostEnforcer, t: Time] {
            let total = addFloat[e.accumulated_cost[t], e.reserved_cost[t]] |
                leq[total, e.limit]
        }
      python: |
        # In _verify_invariants() at lines 976-984:
        total = self._accumulated_cost + self._reserved_cost
        epsilon = 0.0001  # Floating point tolerance
        if total > self.config.limit + epsilon:
            violations.append(...)
      correspondence: |
        Alloy uses exact comparison (leq).
        Python uses epsilon=0.0001 tolerance for floating point.
        This is ACCEPTABLE - epsilon handles float imprecision, makes code slightly more permissive (by 0.0001).
    notes: "Functional match. Python epsilon is defensive for floating point, not a gap."

  # --- INV-005: released permits inactive ---
  - id: INV-005
    element: "I5: released permits inactive"
    result: match
    verification:
      alloy: |
        pred I5_ReleasedInactive[p: Permit, t: Time] {
            -- After release, permit.active must be False
            p.active[t] = False
        }
      python: |
        # Structural invariant via Permit.mark_released():
        def mark_released(self) -> bool:
            if not self.active:
                return False
            self.active = False  # Atomically sets active=False
            return True
      correspondence: "Structural invariant. Once mark_released() is called, active=False permanently."
    notes: "Enforced by design. Permit.active is set to False and never set back to True."

