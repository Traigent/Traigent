name: Dispatch G8 Validation

# Runs only after the real PR aggregate. It never checks out or executes PR
# code; all dispatched provenance comes directly from workflow_run metadata.
on:
  workflow_run:
    workflows: ["SDK Required PR Gate"]
    types: [completed]

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch validation-spine G8
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch exact aggregate provenance
        env:
          GH_TOKEN: ${{ secrets.VALIDATION_CI_PAT }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_WORKFLOW: ${{ github.event.workflow_run.name }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_BASE_BRANCH: ${{ github.event.workflow_run.pull_requests[0].base.ref }}
        run: |
          set -euo pipefail
          fail() {
            echo "::error::validation-g8: $1"
            exit 1
          }

          [ -n "${GH_TOKEN:-}" ] || fail "VALIDATION_CI_PAT is not configured"
          [ "$SOURCE_WORKFLOW" = "SDK Required PR Gate" ] || fail "unexpected source workflow: $SOURCE_WORKFLOW"
          [[ "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]] || fail "source run id is missing or invalid"
          [[ "$SOURCE_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]] || fail "source head SHA is missing or invalid"
          [ -n "$SOURCE_BASE_BRANCH" ] || fail "source base branch is missing"
          [ -n "$SOURCE_HEAD_BRANCH" ] || fail "source head branch is missing"

          gh api --method POST repos/Traigent/traigent-validation-spine/dispatches \
            -f event_type=validation-g8 \
            -f client_payload[source_repo]="$SOURCE_REPO" \
            -f client_payload[source_workflow]="$SOURCE_WORKFLOW" \
            -f client_payload[source_run_id]="$SOURCE_RUN_ID" \
            -f client_payload[source_head_branch]="$SOURCE_HEAD_BRANCH" \
            -f client_payload[source_base_branch]="$SOURCE_BASE_BRANCH" \
            -f client_payload[source_head_sha]="$SOURCE_HEAD_SHA"
