name: Documentation Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-docs:
    name: Quick Doc Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check required files
      run: |
        test -f README.md || exit 1
        test -f CONTRIBUTING.md || exit 1

    - name: Check for broken markdown links
      shell: python
      run: |
        import re
        import sys
        from pathlib import Path

        SKIP_DIRS = {".archive", "_archived", ".release_review", ".post_release_recommendation_fixes",
                     "node_modules", ".git", "venv", ".venv", "configs", ".claude", "local", "_bmad"}

        errors = []
        for md_file in Path(".").rglob("*.md"):
            if any(part in SKIP_DIRS for part in md_file.parts):
                continue
            if len(md_file.parts) > 1 and md_file.parts[0] == "docs" and md_file.parts[1] == "internal":
                continue
            content = md_file.read_text()
            links = re.findall(r"\[([^\]]+)\]\(([^\)]+)\)", content)
            for text, link in links:
                if link.startswith("#") or link.startswith("http"):
                    continue
                # Strip anchor fragments before checking path
                link_path = link.split("#")[0]
                if not link_path:
                    continue
                if not Path(link_path).exists() and not Path(md_file.parent / link_path).exists():
                    errors.append(f"{md_file}: Broken link to {link}")

        if errors:
            print("Broken links found:")
            for error in errors[:10]:
                print(f"  {error}")
            sys.exit(1)
        else:
            print("No broken links found")
