name: Documentation Validation

on:
  push:
    branches: [ main ]  # Only main branch
    paths:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:  # Manual trigger only

jobs:
  validate-docs:
    name: Quick Doc Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Basic validation
      run: |
        echo "📝 Checking documentation files..."

        # Check required files exist
        test -f README.md || exit 1
        test -f CONTRIBUTING.md || exit 1

        # Check for broken markdown links (simple check)
        python -c "
import re
from pathlib import Path

errors = []
for md_file in Path('.').rglob('*.md'):
    content = md_file.read_text()
    # Find markdown links
    links = re.findall(r'\[([^\]]+)\]\(([^\)]+)\)', content)
    for text, link in links:
        if link.startswith('#'):  # Internal anchor
            continue
        if link.startswith('http'):  # External link
            continue
        # Check if local file exists
        if not Path(link).exists() and not Path(md_file.parent / link).exists():
            errors.append(f'{md_file}: Broken link to {link}')

if errors:
    print('❌ Broken links found:')
    for error in errors[:10]:  # Limit output
        print(f'  {error}')
    exit(1)
else:
    print('✅ No broken links found')
"

        echo "✅ Documentation validation passed"
