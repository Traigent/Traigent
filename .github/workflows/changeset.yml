name: Changeset Required

on:
  pull_request:
    branches: [main]

jobs:
  changeset-required:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/ci/check-changeset.mjs
