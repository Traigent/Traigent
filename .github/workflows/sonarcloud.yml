name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

# Disable concurrency to prevent job cancellation issues
# Each PR gets its own run without interference
concurrency:
  group: sonarcloud-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Job-level timeout
    # Surface SONAR_TOKEN at job scope so the scan step can detect when it is
    # unavailable. Dependabot-triggered runs and PRs from forks do NOT receive
    # repository Actions secrets, so the token is empty there and the upstream
    # `sonar-scanner` aborts with "Project not found" (exit code 3). In that
    # case we skip the upload instead of failing the gate; unit tests and
    # coverage above still run. Analysis is unaffected on pushes to main and on
    # same-repo human PRs, where the token is present. Mirrors the capability-
    # detect-then-skip pattern already used by the codeql job in release-review.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # Shallow clones disabled for better analysis

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e ".[dev,analytics,test]"

      - name: Run tests with coverage
        run: |
          # Run unit tests to ensure coverage for all changed code
          pytest tests/unit/ \
            --cov=traigent \
            --cov-report=xml \
            --cov-report=term \
            -q \
            --timeout=30 \
            || true
        timeout-minutes: 10  # Step-level timeout for tests
        env:
          TRAIGENT_MOCK_LLM: "true"
          TRAIGENT_OFFLINE_MODE: "true"

      - name: Run MCP coverage append
        run: |
          pip install -e ".[mcp]"
          pytest tests/unit/mcp/test_local_server.py \
            --cov=traigent \
            --cov-append \
            --cov-report=xml \
            --cov-report=term \
            -q \
            --timeout=30 \
            || true
        timeout-minutes: 5
        env:
          TRAIGENT_MOCK_LLM: "true"
          TRAIGENT_OFFLINE_MODE: "true"

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Note skipped SonarCloud upload
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "::notice title=SonarCloud upload skipped::SONAR_TOKEN is unavailable (Dependabot or fork PR cannot read repository Actions secrets). Skipping the SonarCloud upload; unit tests and coverage still ran above. Full analysis runs on pushes to main and on same-repo human PRs where the token is present."
