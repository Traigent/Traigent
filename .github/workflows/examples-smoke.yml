name: Examples Smoke Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'examples/**'
      - 'traigent/**'
      - 'scripts/examples/**'
      - 'README.md'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'examples/**'
      - 'traigent/**'
      - 'scripts/examples/**'
      - 'README.md'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,integrations]"

    - name: Validate example syntax
      run: |
        python -m compileall examples/ -x "examples/archive/"

    - name: Test example imports
      run: |
        python -c "import sys; sys.path.insert(0, 'examples'); import utils.base_example"

    - name: Run quickstart example
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
      run: |
        python examples/quickstart/01_simple_qa.py

    - name: Run core examples smoke test
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
        TRAIGENT_RUN_APPROVED: "1"
        ANTHROPIC_API_KEY: "sk-ant-test-mock-key-for-ci" # pragma: allowlist secret
        TRAIGENT_API_KEY: "test-traigent-api-key-for-ci" # pragma: allowlist secret
      run: |
        python scripts/examples/run_examples.py --base examples/core --pattern "run.py" --timeout 120 --verbose

    - name: Test advanced example structure
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
        TRAIGENT_RUN_APPROVED: "1"
      continue-on-error: true  # Advanced examples may require optional deps (ragas, etc.)
      run: |
        python scripts/examples/run_examples.py --base examples/advanced --pattern "run.py" --timeout 60 --no-structure-validation

    - name: Run structured output example
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
        TRAIGENT_RUN_APPROVED: "1"
        ANTHROPIC_API_KEY: "sk-ant-test-mock-key-for-ci" # pragma: allowlist secret
        TRAIGENT_API_KEY: "test-traigent-api-key-for-ci" # pragma: allowlist secret
      run: |
        python examples/core/structured-output-json/run.py

    - name: Test README examples
      if: matrix.python-version == '3.11'
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
      run: |
        python -m pytest tests/examples/test_readme_examples.py -v

    - name: Run diagnostics
      run: |
        python -c "from traigent.utils.diagnostics import diagnose; report = diagnose(); report.print_report()"

    - name: Upload diagnostic report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: diagnostic-report-${{ matrix.python-version }}
        path: traigent_diagnostic_report.json

  quick-validation:
    name: Quick Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Quick install and test
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
      run: |
        pip install -e ".[dev,integrations]"
        python -c "import traigent; print('Import works')"
        python examples/quickstart/01_simple_qa.py || true
        echo "Quick validation passed"

  lint-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black

    - name: Lint examples with ruff
      run: |
        ruff check examples/ --exclude examples/archive/

    - name: Check code formatting with black
      run: |
        # Exclude documentation examples and templates (intentionally formatted for readability)
        black --check examples/ --exclude '(examples/(archive|templates|tvl/reusable_safety/run_demo\.py|advanced/(execution-modes|results-analysis))|docs/page-inline)'

  docs-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate documentation links
      run: |
        # Check for broken internal links in examples README
        if grep -r "examples/archive" examples/README.md; then
          echo "Found references to archive paths in main README"
          exit 1
        fi

        # Check that all referenced examples exist
        for example in $(grep -o "examples/core/[a-z0-9\\-]*/run.py" examples/README.md | sort -u); do
          if [ ! -f "$example" ]; then
            echo "Referenced example does not exist: $example"
            exit 1
          fi
        done

        echo "All documentation links validated"

    - name: Check archive index exists
      run: |
        if [ ! -d "examples/archive" ]; then
          echo "Archive directory not present; skipping check"
          exit 0
        fi
        if [ ! -f "examples/archive/README.md" ]; then
          echo "Archive overview missing"
          exit 1
        fi
        echo "Archive overview exists"
