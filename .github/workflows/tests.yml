name: Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        bash scripts/ci/install_sdk_requirements.sh build wheel -e ".[dev,all]"

    - name: Lint with ruff
      run: |
        ruff check traigent/ traigent_validation/ --output-format=github

    - name: Enforce strict cost accounting guardrails
      run: |
        bash scripts/hooks/check-cost-strictness.sh

    - name: Type check with mypy
      run: |
        mypy traigent/ traigent_validation/

    - name: Test with pytest
      env:
        TRAIGENT_MOCK_LLM: true
        TRAIGENT_OFFLINE_MODE: true
        PYTHONPATH: .
      run: |
        pytest tests/unit/ -v --cov=traigent --cov=traigent_validation --cov-report=xml --cov-report=term-missing --tb=short --timeout=60

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        bash scripts/ci/install_sdk_requirements.sh -e ".[all]"

    - name: Run integration tests
      env:
        TRAIGENT_MOCK_LLM: true
        TRAIGENT_OFFLINE_MODE: true
        PYTHONPATH: .
      run: |
        pytest tests/integration/ -v --tb=short

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        bash scripts/ci/install_sdk_requirements.sh safety bandit[toml] -e .

    - name: Run safety check
      run: |
        safety check --json --output safety-report.json || true

    - name: Run bandit security scan
      run: |
        bandit -r traigent/ -f json -o bandit-report.json || true

    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json

        retention-days: 30
  build-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        bash scripts/ci/install_sdk_requirements.sh build twine

    - name: Build package
      run: |
        python -m build

    - name: Check package with twine
      run: |
        twine check dist/*

    - name: Test installation from built package
      run: |
        bash scripts/ci/install_sdk_requirements.sh
        pip install dist/*.whl
        python -c "import traigent; print(f'Successfully imported traigent v{traigent.__version__}')"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/
        retention-days: 30
