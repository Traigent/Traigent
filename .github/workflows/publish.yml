name: Publish to PyPI

on:
  # Auto-publish when a version tag is pushed (e.g. v0.10.0)
  push:
    tags:
      - "v*"

  # Keep manual dispatch as fallback (e.g. for TestPyPI)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to publish to'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi
      confirm_publish:
        description: 'Set to true to allow publishing'
        required: true
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    # Run if: tag push OR manual dispatch with confirmation
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.confirm_publish == 'true'
    environment: ${{ (github.event_name == 'push' && 'pypi') || github.event.inputs.environment || 'pypi' }}
    outputs:
      package_version: ${{ steps.package_version.outputs.package_version }}
    permissions:
      id-token: write  # For trusted publishing
      contents: read

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Full history for version detection

    - name: Verify tag is on main branch
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GIT_SHA: ${{ github.sha }}
        GIT_REF_NAME: ${{ github.ref_name }}
      run: |
        git fetch origin main
        if ! git merge-base --is-ancestor "$GIT_SHA" origin/main; then
          echo "Error: tag $GIT_REF_NAME is not on the main branch. Only tag from main."
          exit 1
        fi
        echo "Tag $GIT_REF_NAME is on main — proceeding."

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine

    - name: Read package version
      id: package_version
      run: |
        VERSION=$(python - <<'PY'
        import tomllib

        with open("pyproject.toml", "rb") as handle:
            print(tomllib.load(handle)["project"]["version"])
        PY
        )
        echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Verify version consistency
      env:
        VERSION_PYPROJECT: ${{ steps.package_version.outputs.package_version }}
      run: |
        echo "pyproject.toml version: $VERSION_PYPROJECT"

        # If triggered by a tag, verify the tag matches the package version
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Git tag version: $TAG_VERSION"
          if [ "$TAG_VERSION" != "$VERSION_PYPROJECT" ]; then
            echo "Error: Git tag v$TAG_VERSION does not match package version $VERSION_PYPROJECT"
            exit 1
          fi
          echo "Tag v$TAG_VERSION matches package version $VERSION_PYPROJECT"
        fi

    - name: Run tests before publishing
      env:
        TRAIGENT_MOCK_LLM: true
        TRAIGENT_OFFLINE_MODE: true
        PYTHONPATH: .
      run: |
        python -m pip install -e ".[dev,all]"
        pytest tests/unit/ -v --tb=short

    - name: Run example smoke before publishing
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
        TRAIGENT_COST_APPROVED: "true"
        ANTHROPIC_API_KEY: "sk-ant-test-mock-key-for-ci" # pragma: allowlist secret
        OPENAI_API_KEY: "sk-openai-test-mock-key-for-ci" # pragma: allowlist secret
        TRAIGENT_API_KEY: "test-traigent-api-key-for-ci" # pragma: allowlist secret
      run: |
        bash examples/test_all_examples.sh quickstart
        bash examples/test_all_examples.sh docs
        bash examples/test_all_examples.sh core

    - name: Build package
      run: |
        python -m build

    - name: Check package with twine
      run: |
        twine check dist/*

    - name: Test installation from built package
      run: |
        pip install dist/*.whl
        python -c "import traigent; print(f'Package test: traigent v{traigent.__version__} imported successfully')"

    # Publish to Test PyPI (manual dispatch only)
    - name: Publish to Test PyPI
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi'
      uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true

    # Publish to production PyPI (automatic on tag push, or manual dispatch)
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')
      uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
      with:
        verbose: true

    - name: Create deployment summary
      if: always()
      env:
        ENVIRONMENT: ${{ (github.event_name == 'push' && 'pypi (auto from tag)') || github.event.inputs.environment || 'unknown' }}
        TRIGGER: ${{ github.event_name }}
        REF: ${{ github.ref }}
        JOB_STATUS: ${{ job.status }}
      run: |
        echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Version**: $(python -c "import traigent; print(traigent.__version__)")" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Environment**: $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Trigger**: $TRIGGER" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Ref**: $REF" >> "$GITHUB_STEP_SUMMARY"
        echo "- **Status**: $JOB_STATUS" >> "$GITHUB_STEP_SUMMARY"

  verify-publication:
    needs: publish
    runs-on: ubuntu-latest
    if: always() && needs.publish.result == 'success'

    steps:
    - name: Wait for package propagation
      run: sleep 300

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Test installation from PyPI
      env:
        EXPECTED_VERSION: ${{ needs.publish.outputs.package_version }}
        PUBLISH_ENVIRONMENT: ${{ github.event.inputs.environment }}
      run: |
        if [ "$PUBLISH_ENVIRONMENT" = "testpypi" ]; then
          PACKAGE_LABEL="TestPyPI"
          PACKAGE_API_URL="https://test.pypi.org/pypi/traigent/json"
          INSTALL_ARGS=(--index-url "https://test.pypi.org/simple/" --extra-index-url "https://pypi.org/simple/")
        else
          PACKAGE_LABEL="PyPI"
          PACKAGE_API_URL="https://pypi.org/pypi/traigent/json"
          INSTALL_ARGS=()
        fi

        VERSION="$EXPECTED_VERSION"
        echo "Testing installation of traigent==$VERSION from $PACKAGE_LABEL"

        # Retry API check up to 5 times (CDN propagation can be slow)
        for attempt in 1 2 3 4 5; do
          echo "Attempt $attempt: checking $PACKAGE_LABEL API for version $VERSION..."
          HTTP_CODE=$(curl -sL -w '%{http_code}' -o /tmp/pypi_response.json "$PACKAGE_API_URL" || echo "000")
          if [ "$HTTP_CODE" = "200" ] && CHECK_VERSION="$VERSION" python -c "
        import json, os, sys
        with open('/tmp/pypi_response.json') as f:
            data = json.load(f)
        version = os.environ['CHECK_VERSION']
        releases = data.get('releases', {})
        if version not in releases or not releases[version]:
            sys.exit(1)
        print(f'Verified version {version} exists on package index')
        "
          then
            break
          fi
          if [ "$attempt" -lt 5 ]; then
            echo "Version not found yet (HTTP $HTTP_CODE), waiting 60s before retry..."
            sleep 60
          else
            echo "Error: version $VERSION not found on $PACKAGE_LABEL after 5 attempts"
            exit 1
          fi
        done

        # Create clean environment and test installation
        python -m venv test_env
        source test_env/bin/activate
        pip install --upgrade pip

        # Retry pip install up to 5 times (CDN propagation can lag behind the API)
        for install_attempt in 1 2 3 4 5; do
          echo "Install attempt $install_attempt: pip install traigent==$VERSION..."
          if pip install "${INSTALL_ARGS[@]}" "traigent==$VERSION"; then
            echo "Package installed successfully"
            break
          fi
          if [ "$install_attempt" -lt 5 ]; then
            echo "Install failed (CDN not ready), waiting 60s before retry..."
            sleep 60
          else
            echo "Error: pip install traigent==$VERSION failed after 5 attempts"
            exit 1
          fi
        done

        # Test basic import
        python -c "import traigent; print(f'Successfully installed and imported traigent v{traigent.__version__}')"

    - name: Notify on success
      if: success()
      run: |
        echo "✅ Package successfully published and verified on PyPI!" >> "$GITHUB_STEP_SUMMARY"
        echo "Users can now install with: \`pip install traigent\`" >> "$GITHUB_STEP_SUMMARY"
