name: Publish to PyPI

on:
  # Auto-publish when a version tag is pushed (e.g. v0.10.0)
  push:
    tags:
      - "v*"

  # Keep manual dispatch as fallback (e.g. for TestPyPI)
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to publish to'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi
      confirm_publish:
        description: 'Set to true to allow publishing'
        required: true
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    # Run if: tag push OR manual dispatch with confirmation
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.confirm_publish == 'true'
    environment: ${{ (github.event_name == 'push' && 'pypi') || github.event.inputs.environment || 'pypi' }}
    permissions:
      id-token: write  # For trusted publishing
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for version detection

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine

    - name: Verify version consistency
      run: |
        VERSION_PYPROJECT=$(grep "^version = " pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        VERSION_INIT=$(python -c "import traigent; print(traigent.__version__)")
        echo "pyproject.toml version: $VERSION_PYPROJECT"
        echo "__init__.py version: $VERSION_INIT"
        if [ "$VERSION_PYPROJECT" != "$VERSION_INIT" ]; then
          echo "Error: Version mismatch between pyproject.toml and __init__.py"
          exit 1
        fi

        # If triggered by a tag, verify the tag matches the package version
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Git tag version: $TAG_VERSION"
          if [ "$TAG_VERSION" != "$VERSION_PYPROJECT" ]; then
            echo "Error: Git tag v$TAG_VERSION does not match package version $VERSION_PYPROJECT"
            exit 1
          fi
          echo "Tag v$TAG_VERSION matches package version $VERSION_PYPROJECT"
        fi

    - name: Run tests before publishing
      env:
        TRAIGENT_MOCK_LLM: true
        TRAIGENT_OFFLINE_MODE: true
        PYTHONPATH: .
      run: |
        python -m pip install -e ".[dev,all]"
        pytest tests/unit/ -v --tb=short

    - name: Run example smoke before publishing
      env:
        TRAIGENT_MOCK_LLM: "true"
        TRAIGENT_OFFLINE_MODE: "true"
        TRAIGENT_COST_APPROVED: "true"
        ANTHROPIC_API_KEY: "sk-ant-test-mock-key-for-ci" # pragma: allowlist secret
        OPENAI_API_KEY: "sk-openai-test-mock-key-for-ci" # pragma: allowlist secret
        TRAIGENT_API_KEY: "test-traigent-api-key-for-ci" # pragma: allowlist secret
      run: |
        bash examples/test_all_examples.sh quickstart
        bash examples/test_all_examples.sh docs
        bash examples/test_all_examples.sh core

    - name: Build package
      run: |
        python -m build

    - name: Check package with twine
      run: |
        twine check dist/*

    - name: Test installation from built package
      run: |
        pip install dist/*.whl
        python -c "import traigent; print(f'Package test: traigent v{traigent.__version__} imported successfully')"

    # Publish to Test PyPI (manual dispatch only)
    - name: Publish to Test PyPI
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi'
      uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
      with:
        repository-url: https://test.pypi.org/legacy/
        verbose: true

    # Publish to production PyPI (automatic on tag push, or manual dispatch)
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')
      uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
      with:
        verbose: true

    - name: Create deployment summary
      if: always()
      run: |
        ENVIRONMENT="${{ (github.event_name == 'push' && 'pypi (auto from tag)') || github.event.inputs.environment || 'unknown' }}"
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: $(python -c "import traigent; print(traigent.__version__)")" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
        echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Ref**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  verify-publication:
    needs: publish
    runs-on: ubuntu-latest
    if: always() && needs.publish.result == 'success'

    steps:
    - name: Wait for package propagation
      run: sleep 60

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Test installation from PyPI
      run: |
        # Get the version that was just published
        VERSION=$(curl -s https://pypi.org/pypi/traigent/json | python -c "import sys, json; print(json.load(sys.stdin)['info']['version'])" || echo "unknown")
        echo "Testing installation of traigent==$VERSION"

        # Create clean environment and test installation
        python -m venv test_env
        source test_env/bin/activate
        pip install --upgrade pip

        # Try to install the package
        pip install traigent==$VERSION

        # Test basic import
        python -c "import traigent; print(f'Successfully installed and imported traigent v{traigent.__version__}')"

    - name: Notify on success
      if: success()
      run: |
        echo "✅ Package successfully published and verified on PyPI!" >> $GITHUB_STEP_SUMMARY
        echo "Users can now install with: \`pip install traigent\`" >> $GITHUB_STEP_SUMMARY
