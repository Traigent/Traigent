name: Protected Target Authorization

# This workflow deliberately uses pull_request_target and never checks out or
# executes pull-request code. The workflow definition is read from the trusted
# base branch, so a contributor cannot rewrite the gate in their own PR.
on:
  pull_request_target:
    branches: [develop, main]
    types: [opened, reopened, synchronize, ready_for_review]
  merge_group: {}

permissions:
  contents: read

jobs:
  principal-target-authorization:
    name: principal-target-authorization
    runs-on: ubuntu-latest
    steps:
      - name: Require Principal Engineer as protected-target author
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PRINCIPAL_ENGINEER: nimrodbusany
        run: |
          # A merge-group commit is created only after the PR gate above passed.
          # Its event has no pull-request author, so it must preserve the same
          # required-check context for the merge queue.
          if [ "$EVENT_NAME" = "merge_group" ]; then
            exit 0
          fi

          if [ "$PR_AUTHOR" != "$PRINCIPAL_ENGINEER" ]; then
            echo "Protected branches accept pull requests only from the Principal Engineer."
            echo "Author: $PR_AUTHOR"
            exit 1
          fi
