name: Example Auto-Tune Demo (Secure)

# Hardened example workflow for SDK users exploring auto-tuning with
# optional security scans and real infrastructure. This is not part of
# the SDK release gate and is manual-only by design.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to tune for'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      max_trials:
        description: 'Maximum number of trials'
        required: false
        default: '10'
        type: number
      budget:
        description: 'Maximum budget in USD'
        required: false
        default: '5.0'
        type: number
      apply_changes:
        description: 'Allow DVC push and PR creation'
        required: true
        default: false
        type: boolean

# Concurrency control to prevent abuse
concurrency:
  group: example-auto-tune-${{ github.ref }}
  cancel-in-progress: false

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety semgrep

      - name: Run Bandit security scan
        run: |
          bandit -r scripts/ traigent/ -f json -o bandit-report.json || true
          # Treat low/medium Bandit findings as report-only for this demo workflow.
          bandit -r scripts/ traigent/ -f txt -lll

      - name: Run Safety check
        run: |
          pip install -e .
          safety check --json --output safety-report.json || true
          safety check || true

      - name: Run Semgrep
        continue-on-error: true
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d  # v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python

      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit .secrets.baseline || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  validation:
    name: Pre-flight Validation
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate configuration files
        run: |
          # Validate YAML files
          python -c "
          import yaml
          import sys
          for file in [
              'examples/ci-pipeline/params.yaml',
              'examples/ci-pipeline/dvc.yaml',
              'configs/auto_tune_config.yaml',
          ]:
              try:
                  with open(file) as f:
                      yaml.safe_load(f)
                  print(f'✅ {file} is valid')
              except Exception as e:
                  print(f'❌ {file} is invalid: {e}')
                  sys.exit(1)
          "

      - name: Check required secrets
        run: |
          required_secrets=(
            "ANTHROPIC_API_KEY"
            "OPENAI_API_KEY"
          )

          for secret in "${required_secrets[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "⚠️ Warning: $secret is not set"
            else
              echo "✅ $secret is configured"
            fi
          done
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate budget limits
        run: |
          python -c "
          import yaml
          with open('examples/ci-pipeline/params.yaml') as f:
              params = yaml.safe_load(f)

          budget = float('${{ github.event.inputs.budget || 5.0 }}')
          if budget > 25:
              print(f'❌ Budget ${budget} exceeds maximum allowed ($25)')
              exit(1)
          print(f'✅ Budget ${budget} is within limits')
          "

  auto-tune:
    name: Auto-Tuning Optimization
    runs-on: ubuntu-latest
    needs: validation

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    timeout-minutes: 60  # Hard timeout for cost control

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,integrations,bayesian]"
          # setup-cml provides the CML CLI; pin modern DVC to avoid legacy resolver pulls.
          pip install "dvc[s3]>=3,<4" "dvclive>=3,<4"

      - name: Setup CML
        uses: iterative/setup-cml@f12ea7685438c1fc438d50f77519b3860cf5fa98  # v2.0.1

      - name: Prepare pipeline workspace
        run: |
          cp examples/ci-pipeline/dvc.yaml dvc.yaml
          cp examples/ci-pipeline/params.yaml params.yaml

      - name: Initialize DVC repository
        run: |
          if [ ! -d ".dvc" ]; then
            dvc init --quiet --force
          fi

      - name: Configure AWS credentials via OIDC
        if: github.event.inputs.environment != 'development' && vars.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-auto-tune-secure
          aws-region: us-east-1

      - name: Pull DVC data
        run: |
          dvc pull || echo "No DVC data to pull (first run)"

      - name: Set environment
        id: env
        run: |
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT

      - name: Set tuning parameters
        id: params
        run: |
          ENV="${{ steps.env.outputs.environment }}"

          # Set defaults based on environment with strict limits
          if [[ "$ENV" == "production" ]]; then
            MAX_TRIALS="${{ github.event.inputs.max_trials || '50' }}"
            BUDGET="${{ github.event.inputs.budget || '25.0' }}"
          elif [[ "$ENV" == "staging" ]]; then
            MAX_TRIALS="${{ github.event.inputs.max_trials || '20' }}"
            BUDGET="${{ github.event.inputs.budget || '10.0' }}"
          else
            MAX_TRIALS="${{ github.event.inputs.max_trials || '10' }}"
            BUDGET="${{ github.event.inputs.budget || '5.0' }}"
          fi

          # Enforce maximum limits
          if (( $(echo "$BUDGET > 25" | bc -l) )); then
            echo "⚠️ Budget exceeds maximum, capping at $25"
            BUDGET="25.0"
          fi

          echo "max_trials=$MAX_TRIALS" >> $GITHUB_OUTPUT
          echo "budget=$BUDGET" >> $GITHUB_OUTPUT

      - name: Run pre-optimization tests
        run: |
          # Run security utilities tests
          pytest tests/auto_tune/test_security_utils.py -v || true

          # Test performance check hook
          TRAIGENT_MOCK_LLM=true TRAIGENT_OFFLINE_MODE=true python scripts/hooks/performance_check.py

      - name: Run auto-tuning pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRAIGENT_MOCK_LLM: ${{ steps.env.outputs.environment == 'development' && 'true' || 'false' }}
          TRAIGENT_OFFLINE_MODE: ${{ steps.env.outputs.environment == 'development' && 'true' || 'false' }}
          MAX_BUDGET: ${{ steps.params.outputs.budget }}
        run: |
          # Update DVC params
          python -c "
          import yaml
          with open('params.yaml', 'r') as f:
              params = yaml.safe_load(f)
          params['optimize']['max_trials'] = ${{ steps.params.outputs.max_trials }}
          params['optimize']['budget'] = ${{ steps.params.outputs.budget }}
          with open('params.yaml', 'w') as f:
              yaml.dump(params, f)
          "

          # Run DVC pipeline with timeout
          timeout 3600 dvc repro || {
            echo "⚠️ Pipeline timed out or failed"
            exit 1
          }

      - name: Generate CML report
        if: always()
        run: |
          # Create performance report
          echo "## 🤖 Secure Auto-Tuning Results" > report.md
          echo "" >> report.md
          echo "**Environment:** ${{ steps.env.outputs.environment }}" >> report.md
          echo "**Max Trials:** ${{ steps.params.outputs.max_trials }}" >> report.md
          echo "**Budget:** \$${{ steps.params.outputs.budget }}" >> report.md
          echo "" >> report.md

          # Add security scan results
          echo "### 🔒 Security Scan" >> report.md
          if [ -f "bandit-report.json" ]; then
            python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          issues = data.get('results', [])
          if not issues:
              print('✅ No security issues found')
          else:
              print(f'⚠️ {len(issues)} security issues found')
          " >> report.md
          fi
          echo "" >> report.md

          # Add performance metrics
          if [ -f "performance_report.json" ]; then
            echo "### 📊 Performance Metrics" >> report.md
            python -c "
          import json
          with open('performance_report.json') as f:
              data = json.load(f)

          metrics = data.get('current_metrics', {})
          budget = data.get('budget', {})

          print('| Metric | Value |')
          print('|--------|-------|')
          print(f\"| Accuracy | {metrics.get('accuracy', 0):.3f} |\")
          print(f\"| Latency | {metrics.get('avg_latency', 0):.2f}s |\")
          print(f\"| Cost | \${metrics.get('total_cost', 0):.2f} |\")
          print(f\"| Budget Used | {(metrics.get('total_cost', 0) / budget.get('limit', 1)) * 100:.1f}% |\")
          print(f\"| Trials | {metrics.get('trials_completed', 0)} |\")

          if data.get('comparison'):
              print('')
              print('### 📈 Comparison with Baseline')
              for summary in data['comparison'].get('summary', []):
                  print(summary)
          " >> report.md
          fi

          # Add audit log summary
          if [ -f "audit_log.jsonl" ]; then
            echo "" >> report.md
            echo "### 📝 Audit Trail" >> report.md
            echo "Events logged for compliance tracking" >> report.md
          fi

          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Check for regressions
        id: regression_check
        run: |
          if [ -f "performance_report.json" ]; then
            python -c "
          import json
          import sys
          with open('performance_report.json') as f:
              data = json.load(f)
          if data.get('comparison', {}).get('has_regression'):
              print('❌ Performance regression detected!')
              sys.exit(1)
          else:
              print('✅ No regressions detected')
          "
          fi

      - name: Push to DVC
        if: success() && github.event.inputs.apply_changes == 'true'
        run: |
          # Add optimization results to DVC
          if [ -f "optimization_results/latest.json" ]; then
            dvc add optimization_results/latest.json
            dvc push || echo "DVC push failed"
          fi

          # Commit DVC files
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add optimization_results/latest.json.dvc .gitignore || true
          git diff --staged --quiet || git commit -m "Update optimization results [skip ci]"

      - name: Create PR with improvements
        if: success() && github.event.inputs.apply_changes == 'true' && steps.env.outputs.environment == 'staging' && !contains(github.ref, 'auto-tune/')
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5  # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: Apply auto-tuning improvements"
          title: "🚀 [Secure] Auto-Tuning Results from Staging"
          body: |
            ## Auto-Tuning Complete!

            This PR contains the optimized configuration from the secure auto-tuning pipeline.

            **Environment:** ${{ steps.env.outputs.environment }}
            **Trials Run:** ${{ steps.params.outputs.max_trials }}
            **Budget Used:** ${{ steps.params.outputs.budget }}

            ### Security Status
            - ✅ Security scan passed
            - ✅ Secrets validation passed
            - ✅ Budget limits enforced

            Please review the performance metrics in the comment below before merging.
          branch: auto-tune/staging-${{ github.run_number }}
          labels: |
            enhancement
            auto-tuning
            performance
            secure

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-tuning-results
          path: |
            optimization_results/
            performance_report.json
            reports/
            performance_plots/
            audit_log.jsonl
            *.log
          retention-days: 30
