name: Spine Core (advisory)

# Additive rollout: this check is intentionally not branch-required yet. It
# complements, and does not replace, required-pr-gate or the Spine Trail Gate.
on:
  pull_request:
    branches: [develop, main]
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:
    branches: [develop, main]
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: spine-core-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  spine-core:
    uses: Traigent/traigent-validation-spine/.github/workflows/spine-core-reusable.yml@e14f105c876a30b270d4939088d8361b720af555
    with:
      repo_id: Traigent
      base_ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_ref || github.event.pull_request.base.ref }}
      head_ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_ref || github.event.pull_request.head.ref }}
      head_sha: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
      mode: advisory
    secrets:
      VALIDATION_CI_PAT: ${{ secrets.VALIDATION_CI_PAT }}

  spine-impact-receipt:
    if: github.event_name == 'pull_request'
    uses: Traigent/traigent-validation-spine/.github/workflows/spine-impact-receipt-reusable.yml@e14f105c876a30b270d4939088d8361b720af555
    with:
      repo_id: Traigent
      pr_number: "${{ github.event.pull_request.number }}"
      base_ref: "${{ github.event.pull_request.base.ref }}"
      base_sha: "${{ github.event.pull_request.base.sha }}"
      head_ref: "${{ github.event.pull_request.head.ref }}"
      head_sha: "${{ github.event.pull_request.head.sha }}"
    secrets:
      VALIDATION_CI_PAT: "${{ secrets.VALIDATION_CI_PAT }}"
