name: Install Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "docs/getting-started/**"
      - "hello_world.py"
      - "scripts/ci/**"
      - ".github/workflows/install-smoke.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "docs/getting-started/**"
      - "hello_world.py"
      - "scripts/ci/**"
      - ".github/workflows/install-smoke.yml"
  # Nightly: run the full OS matrix (ubuntu + macOS + Windows) so the slow
  # macOS/Windows lanes are caught within ~1 day instead of on every PR.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same ref.
# Pattern matches existing concurrency blocks in
# validation-spine-pr.yml, release-review.yml, sonarcloud.yml.
concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # .[recommended] is the default user-facing bundle.
  # Per-branch matrix (mirrors the approved CI-rationalization plan):
  #   develop PR        -> ubuntu / 3.12 only (lean develop gate)
  #   main PR / push     -> ubuntu / 3.11 + 3.12
  #   nightly schedule   -> ubuntu + macOS + Windows / 3.11 + 3.12 (full OS matrix)
  install-recommended:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON( github.event_name == 'schedule' && '["ubuntu-latest","macos-latest","windows-latest"]' || '["ubuntu-latest"]' ) }}
        python-version: ${{ fromJSON( (github.event_name == 'pull_request' && github.base_ref == 'develop') && '["3.12"]' || '["3.11","3.12"]' ) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install .[recommended]
        shell: bash
        run: |
          bash scripts/ci/install_sdk_requirements.sh -e ".[recommended]"

      - name: Verify core import
        run: python -c "import traigent; print(f'traigent {traigent.__version__} OK')"

      - name: Verify key extras are importable
        run: |
          python -c "from langchain_openai import ChatOpenAI; print('langchain_openai OK')"
          python -c "import numpy; print(f'numpy {numpy.__version__} OK')"

      - name: Run source checkout quickstart
        env:
          TRAIGENT_MOCK_LLM: "true"
          TRAIGENT_OFFLINE_MODE: "true"
          TRAIGENT_RUN_APPROVED: "1"
          TRAIGENT_APPROVED_BY: "ci-install-smoke"
        run: python hello_world.py

  # Validates the documented uv source-checkout path from the user guide.
  install-recommended-uv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install .[recommended] with uv
        run: |
          uv venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[recommended]"

      - name: Run source checkout quickstart
        env:
          TRAIGENT_MOCK_LLM: "true"
          TRAIGENT_OFFLINE_MODE: "true"
          TRAIGENT_RUN_APPROVED: "1"
          TRAIGENT_APPROVED_BY: "ci-install-smoke-uv"
        run: |
          source .venv/bin/activate
          python hello_world.py

  # .[enterprise] on Linux only — validates the full dependency surface
  install-enterprise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install .[enterprise]
        run: |
          bash scripts/ci/install_sdk_requirements.sh -e ".[enterprise]"

      - name: Verify core import
        run: python -c "import traigent; print(f'traigent {traigent.__version__} OK')"

      - name: Verify enterprise extras
        run: |
          python -c "from importlib.metadata import version; import opentelemetry.sdk; print(f'opentelemetry-sdk {version(\"opentelemetry-sdk\")} OK')"
          python -c "import boto3; print(f'boto3 {boto3.__version__} OK')"

  # Validates the pip-install user experience for the packaged quickstart.
  # Runs in a temp directory (no repo checkout) to confirm the module works
  # without hello_world.py or any other source-tree file present.
  pip-install-quickstart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7  # needed to build the wheel

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir /tmp/dist

      - name: Install from wheel in a clean temp directory
        run: |
          python -m pip install "/tmp/dist/$(ls /tmp/dist | grep .whl)" "langchain-openai"

      - name: Run packaged quickstart from outside the repo (pip-install simulation)
        env:
          TRAIGENT_MOCK_LLM: "true"
          TRAIGENT_OFFLINE_MODE: "true"
          TRAIGENT_RUN_APPROVED: "1"
          TRAIGENT_APPROVED_BY: "ci-install-smoke"
        working-directory: /tmp
        run: |
          python -m traigent.examples.quickstart
