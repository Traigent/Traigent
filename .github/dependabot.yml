version: 2
# Dependabot tuning notes (2026-05-09):
#   - target-branch: "develop" so PRs flow through the develop → main promote
#     cycle rather than landing directly on the default branch.
#   - schedule: monthly across all ecosystems.
#   - open-pull-requests-limit: 1 per ecosystem (was 3) — at most 3 PRs/month
#     total across pip + github-actions + docker.
#   - groups: single catch-all version-updates per ecosystem covering
#     patch+minor+major. Previously had many domain-specific groups (LLM,
#     langchain, auth-security, api-framework, optimization, dev-tools)
#     which fanned out into multiple PRs and let majors escape as
#     individual PRs when peer-deps clashed. Now everything is one PR.
#   - ignore: hold majors on libraries we audit manually (LLM providers,
#     langchain*, OTel, base images, CI actions). Security updates (CVE-
#     driven) still flow via GitHub's separate Dependabot Security Updates
#     code path and are not throttled by this file.
updates:
  # Python dependencies — pyproject.toml + requirements/*.txt + uv.lock.
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "automated"

    groups:
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      version-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"

    ignore:
      # Python language majors — held manually.
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
      # LLM-provider majors have shipped real breaking APIs (openai 1.x →
      # 2.x restructured the client; litellm cap history shows the same).
      # Security updates still flow via the separate Security Updates path.
      - dependency-name: "openai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "litellm"
        update-types: ["version-update:semver-major"]
      - dependency-name: "anthropic"
        update-types: ["version-update:semver-major"]
      # LangChain has shipped minor-version breaking changes (1.x → 2.x);
      # hold both major and minor for manual review. Wildcard covers every
      # langchain-* and langsmith-* package.
      - dependency-name: "langchain*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "langsmith*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # OpenTelemetry: historically non-semver-compatible jumps.
      - dependency-name: "opentelemetry-*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — monthly, all bumps grouped into 1 PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
          - "major"
    ignore:
      - dependency-name: "SonarSource/sonarqube-scan-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "codecov/codecov-action"
        update-types: ["version-update:semver-major"]

  # Docker — monthly, base-image majors held for hand-review.
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "docker"
      - "automated"
    groups:
      docker:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major"]
      - dependency-name: "alpine"
        update-types: ["version-update:semver-major"]
      - dependency-name: "debian"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ubuntu"
        update-types: ["version-update:semver-major"]
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
