# CodeSync Configuration for Traigent SDK
# This file tells CodeSync where to find project sources and outputs

# Source directory containing Python/JS/TS files to scan
# Set to "traigent" to scan the main package without a src/ wrapper
src_dir: "traigent"

# Documentation directory containing requirements, functionalities, concepts, syncs
docs_dir: "docs"

# Output directory for scan reports (trace_links.json, gaps.json, etc.)
reports_dir: "reports"

# Runtime directory for temporary artifacts
runtime_dir: "runtime"
