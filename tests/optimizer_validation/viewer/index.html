        function filterTests() {
            renderTree();
        }

        function refreshTests() {
            document.getElementById('test-tree').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading tests...
                </div>
            `;
            fetchTests();
            fetchResults();
            fetchGraphData();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== Chatbot Functions ==========
        let chatHistory = [];
        let isChatSending = false;

        function toggleChatbot() {
            const panel = document.getElementById('chatbot-panel');
            const container = document.querySelector('.container');
            const toggleBtn = panel.querySelector('.chatbot-toggle');

            panel.classList.toggle('collapsed');
            container.classList.toggle('chatbot-collapsed');

            toggleBtn.textContent = panel.classList.contains('collapsed') ? '▶' : '◀';
        }

        function handleChatKeydown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendChatMessage();
            }
        }

        function sendQuickAction(text) {
            const input = document.getElementById('chatbot-input');
            input.value = text;
            sendChatMessage();
        }

        function addChatMessage(role, content, toolCalls = null) {
            const messagesContainer = document.getElementById('chatbot-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${role}`;

            // Format content with markdown-like support
            let formattedContent = formatChatContent(content);

            messageDiv.innerHTML = formattedContent;

            // Add tool call indicators if present
            if (toolCalls && toolCalls.length > 0) {
                const toolDiv = document.createElement('div');
                toolDiv.className = 'tool-call-indicator';
                toolDiv.innerHTML = `<span class="tool-icon">🔧</span> Used: ${toolCalls.join(', ')}`;
                messageDiv.appendChild(toolDiv);
            }

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatChatContent(content) {
            // Convert markdown-like syntax to HTML
            let html = escapeHtml(content);

            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Code blocks
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            // Lists (simple)
            html = html.replace(/^- (.+)$/gm, '• $1');

            return html;
        }

        function showTypingIndicator() {
            const messagesContainer = document.getElementById('chatbot-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'chat-typing';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        async function sendChatMessage() {
            if (isChatSending) return;

            const input = document.getElementById('chatbot-input');
            const sendBtn = document.getElementById('chatbot-send');
            const message = input.value.trim();

            if (!message) return;

            // Add user message to UI
            addChatMessage('user', message);
            input.value = '';

            // Add to history
            chatHistory.push({ role: 'user', content: message });

            // Disable input while sending
            isChatSending = true;
            sendBtn.disabled = true;
            input.disabled = true;

            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        history: chatHistory.slice(-10) // Keep last 10 messages for context
                    })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }

                const data = await response.json();

                // Add assistant response
                addChatMessage('assistant', data.response, data.tools_used);

                // Add to history
                chatHistory.push({ role: 'assistant', content: data.response });

            } catch (error) {
                hideTypingIndicator();
                console.error('Chat error:', error);
                addChatMessage('error', `Error: ${error.message}`);
            } finally {
                isChatSending = false;
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        // ========== End Chatbot Functions ==========

        // Initialize
        const savedView = localStorage.getItem('testTreeView');
        if (savedView) {
            const viewSelect = document.getElementById('tree-view');
            if (viewSelect) viewSelect.value = savedView;
        }
        applyViewMode();
        fetchTests();
        fetchResults();
        fetchGraphData();
    
        /**
         * Open file in editor or viewer
         */
        async function openFile(filePath, line = 1) {
            try {
                const response = await fetch(`/api/open?file=${encodeURIComponent(filePath)}&line=${line}`);
                const result = await response.json();

                if (result.editor === 'browser') {
                    // VS Code not available, show in built-in viewer
                    await showFileInViewer(filePath, line);
                } else {
                    console.log(`Opened in ${result.editor}:`, result.file);
                }
            } catch (error) {
                console.error('Failed to open file:', error);
                alert(`Failed to open file: ${error.message}`);
            }
        }

        /**
         * Show file in built-in code viewer
         */
        async function showFileInViewer(filePath, highlightLine = 1) {
            try {
                const response = await fetch(`/api/file/${filePath}`);
                const data = await response.json();

                if (data.error) {
                    alert(`Error: ${data.error}`);
                    return;
                }

                // Create modal if it doesn't exist
                let modal = document.querySelector('.code-modal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.className = 'code-modal';
                    modal.innerHTML = `
                        <div class="code-modal-content">
                            <div class="code-modal-header">
                                <h2 class="code-modal-title"></h2>
                                <button onclick="closeCodeViewer()">Close</button>
                            </div>
                            <div class="code-modal-body">
                                <div class="code-viewer"></div>
                            </div>
                        </div>
                    `;
                    document.body.appendChild(modal);

                    // Close on background click
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) {
                            closeCodeViewer();
                        }
                    });
                }

                // Update title
                modal.querySelector('.code-modal-title').textContent = data.file;

                // Render code with line numbers
                const lines = data.content.split('\n');
                const codeHtml = lines.map((line, idx) => {
                    const lineNum = idx + 1;
                    const isHighlight = lineNum === highlightLine;
                    const escapedLine = line
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    return `<span class="code-line ${isHighlight ? 'highlight' : ''}"><span class="code-line-num">${lineNum}</span>${escapedLine}</span>`;
                }).join('\n');

                modal.querySelector('.code-viewer').innerHTML = codeHtml;

                // Show modal and scroll to highlighted line
                modal.classList.add('active');

                // Scroll to highlighted line
                setTimeout(() => {
                    const highlightedLine = modal.querySelector('.code-line.highlight');
                    if (highlightedLine) {
                        highlightedLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);

            } catch (error) {
                console.error('Failed to load file:', error);
                alert(`Failed to load file: ${error.message}`);
            }
        }

        /**
         * Close code viewer modal
         */
        function closeCodeViewer() {
            const modal = document.querySelector('.code-modal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        /**
         * Make file path clickable
         */
        function makeFilePathClickable(filePath) {
            if (!filePath || filePath === '-') {
                return filePath;
            }
            return `<span class="file-link" onclick="openFile('${filePath}')">${filePath}</span>`;
        }

</script>
