        // ========== Gist Tooltip Functions ==========

        // Pre-run placeholders for dynamic gist functions
        // Use em-dash or ellipsis for cleaner pre-run display
        const GIST_PLACEHOLDERS = {
            'status': '…',
            'outcome': '…',
            'error_type': '…',
            'trial_count': '…',
            'best_score': '…',
            'stop_reason': '…',
            'duration': '…',
            'config_space_size': '…',
            'injection_mode': '…',
            'algorithm': '…',
            'expected_outcome': '…',
            'expected_trials': '…'
        };

        /**
         * Get gist data for a test, either from evidence or auto-generated.
         * Returns object with: template, resolved, values, isResolved
         */
        function getGistData(test, result) {
            const evidence = result?.evidence;

            // Priority 1: Resolved gist from evidence (post-run)
            if (evidence?.gist?.resolved) {
                return {
                    template: evidence.gist.template,
                    resolved: evidence.gist.resolved,
                    values: evidence.gist.values || {},
                    isResolved: true
                };
            }

            // Priority 2: Template from evidence (pre-run with template)
            if (evidence?.scenario?.gist_template) {
                return {
                    template: evidence.scenario.gist_template,
                    resolved: resolveGistPreRun(evidence.scenario.gist_template, test, evidence),
                    values: {},
                    isResolved: false
                };
            }

            // Priority 3: Template from test metadata
            if (test.gist_template) {
                return {
                    template: test.gist_template,
                    resolved: resolveGistPreRun(test.gist_template, test, null),
                    values: {},
                    isResolved: false
                };
            }

            // Priority 4: Auto-generate default gist based on test type
            const defaultTemplate = generateDefaultGist(test);
            if (defaultTemplate) {
                return {
                    template: defaultTemplate,
                    resolved: resolveGistPreRun(defaultTemplate, test, evidence),
                    values: {},
                    isResolved: false
                };
            }

            return null;
        }

        /**
         * Generate a sensible default gist template based on test file/name patterns.
         */
        function generateDefaultGist(test) {
            const file = test.file || '';
            const name = test.name || '';

            // Failure tests - focus on error type
            if (file.includes('failures/') || name.includes('failure') || name.includes('error')) {
                return '{status()} | {error_type()}';
            }

            // Stop condition tests
            if (file.includes('stop_condition') || name.includes('stop')) {
                return '{status()} | {stop_reason()} | {trial_count()} trials';
            }

            // Objective tests
            if (file.includes('objectives') || name.includes('objective')) {
                return '{status()} | best={best_score()}';
            }

            // Config space tests
            if (file.includes('config_spaces') || name.includes('config')) {
                return '{status()} | {config_space_size()}';
            }

            // Injection mode tests
            if (file.includes('injection') || name.includes('injection')) {
                return '{status()} | {injection_mode()}';
            }

            // Algorithm tests
            if (file.includes('algorithm') || name.includes('algorithm')) {
                return '{status()} | {algorithm()} | {trial_count()} trials';
            }

            // Default
            return '{status()} | {trial_count()} trials';
        }

        /**
         * Resolve gist template for pre-run display (with placeholders for dynamic values).
         */
        function resolveGistPreRun(template, test, evidence) {
            if (!template) return '';

            let resolved = template;

            // Static values we can get from test metadata or evidence
            const staticValues = {};

            // From evidence scenario
            if (evidence?.scenario) {
                if (evidence.scenario.injection_mode) {
                    staticValues['injection_mode'] = evidence.scenario.injection_mode;
                }
                if (evidence.scenario.algorithm) {
                    staticValues['algorithm'] = evidence.scenario.algorithm;
                }
                // Config space size from summary
                if (evidence.scenario.config_space?._summary) {
                    const summary = evidence.scenario.config_space._summary;
                    if (summary.has_continuous) {
                        staticValues['config_space_size'] = 'infinite';
                    } else if (summary.categorical_combinations) {
                        staticValues['config_space_size'] = `${summary.categorical_combinations} combos`;
                    }
                }
            }

            // From test params
            if (test.params) {
                if (test.params.injection_mode && !staticValues['injection_mode']) {
                    staticValues['injection_mode'] = test.params.injection_mode;
                }
                if (test.params.algorithm && !staticValues['algorithm']) {
                    staticValues['algorithm'] = test.params.algorithm;
                }
            }

            // Apply static values
            for (const [func, value] of Object.entries(staticValues)) {
                resolved = resolved.replace(`{${func}()}`, value);
            }

            // Apply placeholders for remaining dynamic values
            for (const [func, placeholder] of Object.entries(GIST_PLACEHOLDERS)) {
                resolved = resolved.replace(`{${func}()}`, placeholder);
            }

            return resolved;
        }

        /**
         * Format gist data as HTML with appropriate styling.
         */
        function formatGistHtml(gistData, test, result) {
            if (!gistData || !gistData.resolved) return '';

            let html = escapeHtml(gistData.resolved);

            if (gistData.isResolved && gistData.values) {
                // Post-run: style the status value
                const status = gistData.values.status;
                if (status === 'PASS') {
                    html = html.replace('PASS', '<span class="gist-pass">PASS</span>');
                } else if (status === 'FAIL') {
                    html = html.replace('FAIL', '<span class="gist-fail">FAIL</span>');
                }
                return `<span class="gist-text">${html}</span>`;
            } else {
                // Pre-run: show with placeholder styling
                return `<span class="gist-placeholder">${html}</span>`;
            }
        }

        // ========== End Gist Tooltip Functions ==========

        // ========== Grouped Review View Functions ==========

        // State for grouped view
        let testGroups = [];
        let expandedGroups = new Set();
        let selectedGroupId = null;

        /**
         * Parse test node ID to extract base function name and parameters.
         * e.g., "tests/.../test_x.py::TestClass::test_func[param1-param2]"
         * -> { baseName: "test_func", params: ["param1", "param2"], fullBase: "tests/.../TestClass::test_func" }
         */
        function parseNodeId(nodeId) {
            if (!nodeId) return { baseName: '', params: [], fullBase: '' };

            // Extract the test function part (after last ::)
            const parts = nodeId.split('::');
            const funcPart = parts[parts.length - 1] || '';

            // Split off parameters in brackets
            const bracketMatch = funcPart.match(/^([^\[]+)(?:\[(.+)\])?$/);
            if (!bracketMatch) {
                return { baseName: funcPart, params: [], fullBase: nodeId };
            }

            const baseName = bracketMatch[1];
            const paramStr = bracketMatch[2] || '';
            const params = paramStr ? paramStr.split('-') : [];

            // Build the full base (everything before the [params])
            const fullBase = nodeId.replace(/\[.+\]$/, '');

            return { baseName, params, fullBase };
        }

        /**
         * Build test groups from the list of tests.
         * Groups tests by base function name (without parameters).
         */
        function buildTestGroups(tests) {
            const groupMap = new Map();

            for (const test of tests) {
                const { baseName, params, fullBase } = parseNodeId(test.id);
                const groupId = fullBase;

                if (!groupMap.has(groupId)) {
                    groupMap.set(groupId, {
                        groupId,
                        baseName,
                        tests: [],
                        file: test.file || '',
                        class: test.class || '',
                        module: test.module || ''
                    });
                }

                groupMap.get(groupId).tests.push({
                    test,
                    params,
                    variationName: params.join('-') || test.name
                });
            }

            // Convert map to array and compute group metadata
            const groups = [];
            for (const group of groupMap.values()) {
                // Only show as a group if there are multiple variations or parametrized tests
                const isParametrized = group.tests.length > 1 || group.tests.some(t => t.params.length > 0);

                groups.push({
                    ...group,
                    isParametrized,
                    displayName: formatGroupName(group.baseName, group.tests.length),
                    patternDescription: generatePatternDescription(group),
                    stats: calculateGroupStats(group.tests),
                    confidence: calculateConfidence(group.tests),
                    sampleIndices: selectSampleTests(group.tests)
                });
            }

            // Sort groups: failed first, then by name
            groups.sort((a, b) => {
                // Prioritize groups with failures
                if (a.confidence.level !== b.confidence.level) {
                    const order = { 'review': 0, 'partial': 1, 'not-run': 2, 'high': 3 };
                    return (order[a.confidence.level] || 4) - (order[b.confidence.level] || 4);
                }
                return a.baseName.localeCompare(b.baseName);
            });

            return groups;
        }

        /**
         * Format the group display name.
         */
        function formatGroupName(baseName, count) {
            const prettyName = baseName.replace(/_/g, ' ').replace(/^test /, '');
            if (count > 1) {
                return `${prettyName} (${count})`;
            }
            return prettyName;
        }

        /**
         * Generate a pattern description for a group based on its test characteristics.
         */
        function generatePatternDescription(group) {
            const { baseName, tests, file } = group;

            // Extract common pattern indicators
            const firstTest = tests[0]?.test;
            const hasParams = tests.some(t => t.params.length > 0);
            const paramNames = hasParams ? getParamNames(tests) : [];

            // Check for common test patterns
            if (file.includes('failures/')) {
                if (baseName.includes('dataset')) {
                    return `Validates error handling for ${tests.length} dataset edge cases`;
                }
                return `Verifies proper error handling across ${tests.length} failure scenarios`;
            }

            if (file.includes('injection_mode') || baseName.includes('injection')) {
                return `Tests that each injection mode correctly passes config to the function`;
            }

            if (file.includes('stop_condition') || baseName.includes('stop')) {
                return `Validates optimization stops correctly for each condition type`;
            }

            if (file.includes('config_space') || baseName.includes('config')) {
                return `Tests configuration space handling for ${tests.length} different structures`;
            }

            if (file.includes('objective') || baseName.includes('objective')) {
                return `Validates objective optimization across ${tests.length} configurations`;
            }

            if (file.includes('parallel') || baseName.includes('parallel')) {
                return `Tests parallel execution behavior with varying configurations`;
            }

            // Generic description with parameter info
            if (hasParams && paramNames.length > 0) {
                return `Validates behavior across ${tests.length} ${paramNames.join(', ')} values`;
            }

            if (tests.length > 1) {
                return `Runs ${tests.length} variations of this test scenario`;
            }

            return firstTest?.description || 'Single test scenario';
        }

        /**
         * Extract parameter names from test variations.
         */
        function getParamNames(tests) {
            const names = new Set();
            for (const t of tests) {
                if (t.test.params) {
                    for (const key of Object.keys(t.test.params)) {
                        names.add(key);
                    }
                }
            }
            return Array.from(names);
        }

        /**
         * Calculate statistics for a group's tests.
         */
        function calculateGroupStats(tests) {
            let passed = 0, failed = 0, pending = 0;

            for (const { test } of tests) {
                const result = testResults[test.id];
                if (result?.outcome === 'passed') passed++;
                else if (result?.outcome === 'failed') failed++;
                else pending++;
            }

            return { passed, failed, pending, total: tests.length };
        }

        /**
         * Calculate confidence level for a group.
         */
        function calculateConfidence(tests) {
            const stats = calculateGroupStats(tests);

            if (stats.failed > 0) {
                return {
                    level: 'review',
                    reason: `${stats.failed} of ${stats.total} failed`
                };
            }

            if (stats.pending === stats.total) {
                return {
                    level: 'not-run',
                    reason: 'Tests not executed'
                };
            }

            if (stats.pending > 0) {
                return {
                    level: 'partial',
                    reason: `${stats.passed} passed, ${stats.pending} pending`
                };
            }

            return {
                level: 'high',
                reason: `All ${stats.total} pass`
            };
        }

        /**
         * Select 1-2 representative sample tests for detailed display.
         * Prefers: first passing, first failing (if any).
         */
        function selectSampleTests(tests) {
            const indices = [];

            // Find first passed test
            const passedIdx = tests.findIndex(t => testResults[t.test.id]?.outcome === 'passed');
            if (passedIdx >= 0) {
                indices.push(passedIdx);
            }

            // Find first failed test (different from passed)
            const failedIdx = tests.findIndex(t => testResults[t.test.id]?.outcome === 'failed');
            if (failedIdx >= 0 && failedIdx !== passedIdx) {
                indices.push(failedIdx);
            }

            // If no results yet, just pick first test
            if (indices.length === 0 && tests.length > 0) {
                indices.push(0);
            }

            return indices;
        }

        /**
         * Decode an encoded group ID.
         */
        function decodeGroupId(encodedId) {
            try {
                return decodeURIComponent(atob(encodedId));
            } catch (e) {
                console.error('Failed to decode group ID:', e);
                return '';
            }
        }

        /**
         * Toggle expansion of a group card (with encoded ID).
         */
        function toggleGroupEncoded(encodedId) {
            toggleGroup(decodeGroupId(encodedId));
        }

        /**
         * Toggle expansion of a group card.
         */
        function toggleGroup(groupId) {
            if (expandedGroups.has(groupId)) {
                expandedGroups.delete(groupId);
            } else {
                expandedGroups.add(groupId);
            }
            renderTree();
        }

        /**
         * Run all tests in a group (with encoded ID).
         */
        function runGroupEncoded(encodedId) {
            runGroup(decodeGroupId(encodedId));
        }

        /**
         * Run all tests in a group.
         */
        function runGroup(groupId) {
            const group = testGroups.find(g => g.groupId === groupId);
            if (!group) return;

            // For parametrized tests, we need to run the base test ID which pytest will expand
            // groupId is like "tests/.../test_x.py::TestClass::test_func"
            // This will run all parameter variations of that test
            runTest(groupId);
        }

        /**
         * Render the grouped view in the sidebar.
         */
        function renderGroupedView() {
            const container = document.getElementById('test-tree');
            const tests = getFilteredTests();

            if (!tests.length) {
                container.innerHTML = '<div class="empty-state"><p>No tests found</p></div>';
                return;
            }

            testGroups = buildTestGroups(tests);

            let html = '';
            for (const group of testGroups) {
                html += renderGroupCard(group);
            }

            container.innerHTML = html || '<div class="empty-state"><p>No groups found</p></div>';
        }

        /**
         * Render a single group card.
         */
        function renderGroupCard(group) {
            const isExpanded = expandedGroups.has(group.groupId);
            const confidenceClass = group.confidence.level;
            // Encode groupId for safe use in HTML attributes
            const encodedGroupId = btoa(encodeURIComponent(group.groupId));
            // Check if this group is currently running
            const isRunning = runningTarget && (
                runningTarget === group.groupId ||
                group.tests.some(t => t.test.id.startsWith(runningTarget))
            );

            // Build sample tests HTML
            let samplesHtml = '';
            if (group.sampleIndices.length > 0) {
                samplesHtml = '<div class="sample-tests"><div class="sample-tests-header">Sample Tests</div>';
                for (const idx of group.sampleIndices) {
                    const variation = group.tests[idx];
                    if (variation) {
                        samplesHtml += renderSampleTestCard(variation, group);
                    }
                }
                samplesHtml += '</div>';
            }

            // Build variations table HTML
            const variationsHtml = renderVariationsTable(group);

            return `
                <div class="group-card ${isExpanded ? 'expanded' : ''}" data-group-id="${encodedGroupId}">
                    <div class="group-header" onclick="toggleGroupEncoded('${encodedGroupId}')">
                        <span class="toggle">${isExpanded ? '▼' : '▶'}</span>
                        <span class="group-name">${escapeHtml(group.displayName)}</span>
                        <span class="confidence-badge ${confidenceClass}">${confidenceClass === 'not-run' ? 'NOT RUN' : confidenceClass.toUpperCase()}</span>
                        <span class="group-stats">${group.stats.passed}/${group.stats.total}</span>
                    </div>
                    <div class="group-content">
                        <div class="pattern-description">${escapeHtml(group.patternDescription)}</div>
                        ${samplesHtml}
                        ${variationsHtml}
                        <button class="run-group-btn ${isRunning ? 'running' : ''}" onclick="event.stopPropagation(); runGroupEncoded('${encodedGroupId}')" ${isRunning ? 'disabled' : ''}>
                            ${isRunning ? 'Running...' : 'Run Group'}
                        </button>
                    </div>
                </div>
            `;
        }

        /**
         * Render a sample test card (expanded view of one test).
         */
        function renderSampleTestCard(variation, group) {
            const { test, variationName } = variation;
            const result = testResults[test.id];
            const status = result?.outcome || 'pending';
            const isSelected = selectedTest?.id === test.id;

            // Get gist for this test
            const gistData = getGistData(test, result);
            let gistHtml = '';

            if (gistData?.resolved) {
                // Format with status coloring
                gistHtml = formatGistHtml(gistData, test, result);
            } else if (status === 'pending') {
                gistHtml = '<span class="gist-placeholder">Click to run test</span>';
            }

            return `
                <div class="sample-test-card ${isSelected ? 'selected' : ''}" onclick="selectTest('${escapeHtml(test.id)}')">
                    <div class="test-name">
                        <span class="status-dot ${status}"></span>
                        <strong>${escapeHtml(variationName)}</strong>
                    </div>
                    <div class="test-gist">${gistHtml}</div>
                </div>
            `;
        }

        /**
         * Generate a tooltip description for a variation based on its parameters.
         * Prioritizes unique per-variation info (params) over shared test description.
         */
        function generateVariationTooltip(variation, group) {
            const { test, params, variationName } = variation;

            // First priority: Use actual test params (from pytest parametrize)
            // These give unique info per variation, unlike the shared docstring
            const testParams = test.params || {};
            const paramKeys = Object.keys(testParams);

            if (paramKeys.length > 0) {
                // Build description from actual parameter names and values
                const paramParts = paramKeys.map(key => {
                    const value = testParams[key];
                    const prettyKey = key.replace(/_/g, ' ');
                    const prettyValue = String(value).replace(/_/g, ' ');
                    return `${prettyKey}: ${prettyValue}`;
                });

                // Create contextual description based on file/test context
                const file = test.file || '';
                const baseName = group.baseName || '';

                if (file.includes('failure') || baseName.includes('failure')) {
                    return `Failure handling with ${paramParts.join(', ')}`;
                }
                if (file.includes('algorithm') || paramKeys.includes('algorithm')) {
                    const algo = testParams.algorithm || paramParts[0];
                    const otherParams = paramParts.filter(p => !p.startsWith('algorithm'));
                    if (otherParams.length > 0) {
                        return `${algo} optimizer with ${otherParams.join(', ')}`;
                    }
                    return `${algo} optimizer behavior`;
                }
                if (file.includes('injection') || paramKeys.includes('injection_mode')) {
                    return `${testParams.injection_mode || 'injection'} mode: ${paramParts.join(', ')}`;
                }
                if (file.includes('execution') || paramKeys.includes('execution_mode')) {
                    return `${testParams.execution_mode || 'execution'} mode: ${paramParts.join(', ')}`;
                }
                if (file.includes('objective') || paramKeys.includes('obj_name')) {
                    return `Objective config: ${paramParts.join(', ')}`;
                }
                if (file.includes('constraint') || paramKeys.includes('constraint_name')) {
                    return `Constraint config: ${paramParts.join(', ')}`;
                }
                if (file.includes('parallel') || paramKeys.includes('parallel_mode')) {
                    return `Parallel mode: ${paramParts.join(', ')}`;
                }

                return paramParts.join(', ');
            }

            // Second priority: Use parsed params from test ID (e.g., [param1-param2])
            if (params && params.length > 0) {
                const paramDescriptions = params.map(p => p.replace(/_/g, ' '));
                return `Variation: ${paramDescriptions.join(', ')}`;
            }

            // Last resort: Use variation name formatted nicely
            return variationName.replace(/_/g, ' ').replace(/-/g, ' ');
        }

        /**
         * Render the compact variations table for a group.
         */
        function renderVariationsTable(group) {
            if (group.tests.length <= 2) {
                // For small groups, no need for a table
                return '';
            }

            let rows = '';
            for (let i = 0; i < group.tests.length; i++) {
                const variation = group.tests[i];
                const { test, variationName } = variation;
                const result = testResults[test.id];
                const status = result?.outcome || 'pending';
                const isSample = group.sampleIndices.includes(i);

                // Get expected outcome from evidence (top-level expected, not inside scenario)
                const expected = result?.evidence?.expected?.outcome || '--';
                const actual = result?.evidence?.actual?.type === 'success' ? 'SUCCESS' :
                              (result?.evidence?.actual?.type === 'exception' ? 'EXCEPTION' :
                              (result ? (status === 'passed' ? 'SUCCESS' : 'FAILURE') : '--'));

                const statusIcon = status === 'passed' ? '✓' : (status === 'failed' ? '✗' : '○');

                // Generate tooltip description
                const tooltip = generateVariationTooltip(variation, group);

                rows += `
                    <tr class="clickable" onclick="selectTest('${escapeHtml(test.id)}')" title="${escapeHtml(tooltip)}">
                        <td class="variation-name">
                            ${escapeHtml(variationName)}
                            ${isSample ? '<span class="sample-marker">*</span>' : ''}
                        </td>
                        <td>${escapeHtml(expected)}</td>
                        <td>${escapeHtml(actual)}</td>
                        <td class="status-cell ${status}">${statusIcon}</td>
                    </tr>
                `;
            }

            return `
                <div class="variations-section">
                    <div class="variations-header">All Variations</div>
                    <table class="variations-table">
                        <thead>
                            <tr>
                                <th>Variation</th>
                                <th>Expected</th>
                                <th>Actual</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ========== End Grouped Review View Functions ==========

        function renderTestItem(test) {
            const result = testResults[test.id];
            // Only show running status if this specific test is being run
            const isRunning = runningTarget && (
                runningTarget === test.id ||  // Exact match for single test
                test.id.startsWith(runningTarget)  // Test is in running category
            );
            const status = isRunning ? 'running' : (result?.outcome || 'pending');
            const selected = selectedTest?.id === test.id ? 'selected' : '';

            // Generate gist tooltip
            const gistData = getGistData(test, result);
            const gistHtml = gistData ? `
                <div class="gist-tooltip">
                    ${formatGistHtml(gistData, test, result)}
                </div>
            ` : '';

            return `
                <div class="test-item ${selected}" onclick="selectTest('${test.id}')">
                    <span class="status-dot ${status}"></span>
                    <span class="name">${test.name}</span>
                    ${gistHtml}
                </div>
            `;
        }

        function matchesSearch(test, searchTerm) {
            if (!searchTerm) return true;
            const markers = test.markers ? test.markers.join(' ') : '';
            const haystack = [
                test.name,
                test.id,
                test.description,
                test.full_description,
                test.class,
                test.module,
                test.file,
                markers
            ].filter(Boolean).join(' ').toLowerCase();
            return haystack.includes(searchTerm);
        }

        function getCategoryTests(category) {
            let tests = [];
            for (const sub of Object.values(category.children || {})) {
                tests = tests.concat(sub.tests || []);
            }
            return tests;
        }

        function getCategoryStats(tests) {
            let passed = 0, failed = 0;
            for (const test of tests) {
                const result = testResults[test.id];
                if (result?.outcome === 'passed') passed++;
                else if (result?.outcome === 'failed') failed++;
            }
            return { passed, failed, total: tests.length };
        }

        function toggleNodeById(nodeId) {
            if (expandedNodes.has(nodeId)) {
                expandedNodes.delete(nodeId);
            } else {
                expandedNodes.add(nodeId);
            }
            renderTree();
        }

        function selectTest(testId) {
            selectedTest = allTests.find(t => t.id === testId);

            // Auto-expand parent nodes to show the selected test
            if (selectedTest) {
                const parts = selectedTest.id.split('::');
                const filePath = parts[0];
                const pathParts = filePath.replace('tests/optimizer_validation/', '').split('/');
                if (pathParts.length >= 2) {
                    const category = pathParts[0];
                    const subCategory = pathParts[1].replace('test_', '').replace('.py', '');
                    expandedNodes.add(`cat:${category}`);
                    expandedNodes.add(`sub:${category}:${subCategory}`);
                }
            }

            renderTree();
            showTestDetails(selectedTest);
        }

        function showTestDetails(test) {
            if (!test) return;

            const result = testResults[test.id];
            const container = document.getElementById('main-content');
            // Check if this specific test is running
            const isRunning = runningTarget && (
                runningTarget === test.id ||
                test.id.startsWith(runningTarget)
            );

            // Build result status HTML
            let resultHtml;
            if (isRunning) {
                resultHtml = `
                    <div class="result-status running">
                        <div class="spinner"></div>
                        <span class="text">Running...</span>
                    </div>
                `;
            } else if (result) {
                resultHtml = `
                    <div class="result-status ${result.outcome}">
                        <span class="icon">${result.outcome === 'passed' ? '✅' : '❌'}</span>
                        <span class="text">${result.outcome.toUpperCase()}</span>
                        <span class="duration">${(result.duration || 0).toFixed(3)}s</span>
                    </div>
                    ${result.longrepr ? `<div class="error-output">${escapeHtml(result.longrepr)}</div>` : ''}
                `;
            } else {
                resultHtml = '<p style="color: var(--text-secondary)">Not run yet</p>';
            }

            const markers = test.markers?.map(m => `<span class="tag">${m}</span>`).join('') || '';
            const params = test.params && Object.keys(test.params).length > 0
                ? Object.entries(test.params).map(([k, v]) => `<span class="tag">${k}=${v}</span>`).join('')
                : '';

            // Build comprehensive test description
            const descriptionHtml = buildTestDescription(test);
            const gistHtml = buildTestGist(test, result, isRunning);

            // Build evidence display (replaces simple summary table)
            const evidenceHtml = buildEvidenceDisplay(test, result);

            container.innerHTML = `
                <div class="test-details">
                    <h2>${test.name}</h2>

                    ${gistHtml}

                    <div class="actions-bar">
                        <button class="primary ${isRunning ? 'running' : ''}" onclick="runTest('${test.id}')" ${isRunning ? 'disabled' : ''}>
                            ${isRunning ? 'Running...' : 'Run Test'}
                        </button>
                        <button onclick="openJaeger('${test.name}')">View Trace in Jaeger</button>
                    </div>

                    ${descriptionHtml}

                    ${evidenceHtml}

                    <div class="detail-section">
                        <h3>Last Result</h3>
                        ${resultHtml}
                    </div>

                    <div class="detail-section">
                        <h3>Test Info</h3>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="label">Module</div>
                                <div class="value">${test.module || '-'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">Class</div>
                                <div class="value">${test.class || '-'}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">File</div>
                                <div class="value">${test.file ? makeFilePathClickable(test.file) : '-'}</div>
                            </div>
                        </div>
                    </div>

                    ${markers || params ? `
                    <div class="detail-section">
                        <h3>Markers & Parameters</h3>
                        <div>${markers} ${params}</div>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        function buildTestDescription(test) {
            // Get test description (short) and full docstring
            const shortDesc = test.description || '';
            const fullDesc = test.full_description || '';
            const classDesc = test.class_description || '';
            const params = test.params || {};

            // Build what's being tested
            let whatTested = shortDesc || 'No description available';

            // Add context from class
            let context = '';
            if (classDesc) {
                context = `<div class="context"><strong>Test Group:</strong> ${escapeHtml(classDesc)}</div>`;
            }

            // Add parameter info
            if (Object.keys(params).length > 0) {
                const paramStr = Object.entries(params)
                    .map(([k, v]) => `<strong>${k}</strong>=${v}`)
                    .join(', ');
                context += `<div class="context"><strong>Parameterized with:</strong> ${paramStr}</div>`;
            }

            // Show full docstring if different from short description
            let fullDocHtml = '';
            if (fullDesc && fullDesc !== shortDesc && fullDesc.includes('\n')) {
                // Multi-line docstring - show the full thing
                fullDocHtml = `<div class="full-doc">${escapeHtml(fullDesc)}</div>`;
            }

            return `
                <div class="test-description">
                    <div class="what">${escapeHtml(whatTested)}</div>
                    ${context}
                    ${fullDocHtml}
                </div>
            `;
        }

        function extractManualGist(fullDescription) {
            if (!fullDescription) return '';
            const lines = fullDescription.split('\n');
            for (const line of lines) {
                const trimmed = line.trim();
                const match = trimmed.match(/^(?:[-*]\s*)?(gist|summary|tldr)\s*:\s*(.+)$/i);
                if (match && match[2]) {
                    return match[2].trim();
                }
            }
            return '';
        }

        function prettifyTestName(name) {
            return name ? name.replace(/_/g, ' ') : '';
        }

        function getConfigSummary(configSpace) {
            if (!configSpace) return null;
            const params = Object.keys(configSpace).filter(k => k !== '_summary');
            if (params.length === 0) return null;

            const types = new Set();
            for (const param of params) {
                const paramConfig = configSpace[param] || {};
                if (paramConfig.type) types.add(paramConfig.type);
            }

            let label = 'config';
            if (types.size === 1) {
                const type = Array.from(types)[0];
                if (type === 'categorical') label = 'categorical-only config';
                else if (type === 'continuous') label = 'continuous config';
                else if (type === 'fixed') label = 'fixed config';
                else label = `${type} config`;
            } else if (types.size > 1) {
                label = 'mixed config';
            }

            const summary = configSpace._summary || {};
            const combos = summary.categorical_combinations;
            const hasContinuous = summary.has_continuous;
            const totalSpace = summary.total_space;
            const details = [];

            if (params.length > 1) details.push(`${params.length} params`);
            if (typeof combos === 'number' && combos > 1 && !hasContinuous) {
                details.push(`${combos} combos`);
            }
            if (totalSpace === 'infinite') details.push('infinite space');

            return {
                label,
                details,
                combos,
                paramsCount: params.length,
                hasContinuous: Boolean(hasContinuous),
            };
        }

        function formatConfigSummary(summary, includeDetails = true) {
            if (!summary) return '';
            if (!includeDetails || summary.details.length === 0) return summary.label;
            return `${summary.label} (${summary.details.join(', ')})`;
        }

        function formatExpectedOutcome(expected) {
            if (!expected || !expected.outcome) return '';
            return String(expected.outcome).toUpperCase();
        }

        function formatActualOutcome(actual) {
            if (!actual || !actual.type) return '';
            if (actual.type === 'exception') {
                const type = actual.exception_type ? ` (${actual.exception_type})` : '';
                return `EXCEPTION${type}`;
            }
            if (actual.type === 'success') return 'SUCCESS';
            return String(actual.type).toUpperCase();
        }

        function formatExpectedTrials(expected, scenario) {
            if (!expected) return '';
            const min = expected.min_trials;
            const max = expected.max_trials;
            const scenarioMax = scenario?.max_trials;

            if (max == null && scenarioMax != null && (min === 1 || min == null)) {
                return `max ${scenarioMax} trials`;
            }
            if (min != null && max != null) {
                if (min === max) {
                    return `${min} trial${min === 1 ? '' : 's'}`;
                }
                return `${min}-${max} trials`;
            }
            if (max != null) return `<=${max} trials`;
            if (min != null) return `>=${min} trials`;
            return '';
        }

        function formatActualTrials(actual, scenario) {
            if (!actual || actual.trial_count == null) return '';
            const max = scenario?.max_trials;
            if (max != null) return `${actual.trial_count}/${max} trials`;
            return `${actual.trial_count} trials`;
        }

        function formatDatasetSummary(dataset, scenario) {
            const size = dataset?.size ?? scenario?.dataset_size;
            if (size == null) return '';
            if (size <= 1) return `${size} example${size === 1 ? '' : 's'}`;
            if (dataset && dataset.is_auto_generated === false) {
                return `${size} examples`;
            }
            return '';
        }

        function buildTestGist(test, result, isRunning) {
            const evidence = result?.evidence || null;
            const scenario = evidence?.scenario || {};
            const expected = evidence?.expected || {};
            const actual = evidence?.actual || {};
            const dataset = evidence?.dataset || null;

            const manualGist = extractManualGist(test?.full_description);
            let base = manualGist || scenario.description || test.description || prettifyTestName(test.name) || 'Test summary';
            base = base.trim();

            const configSummary = getConfigSummary(scenario?.config_space);
            const baseLower = base.toLowerCase();
            const useConfigSummaryAsBase = configSummary &&
                (baseLower.startsWith('config space') || base.length > 80);

            if (useConfigSummaryAsBase) {
                base = formatConfigSummary(configSummary, true);
            }

            const extras = [];
            const datasetSummary = formatDatasetSummary(dataset, scenario);
            if (datasetSummary) extras.push(datasetSummary);

            if (!useConfigSummaryAsBase && configSummary) {
                const includeConfig = configSummary.paramsCount > 1 ||
                    (typeof configSummary.combos === 'number' && configSummary.combos > 1) ||
                    configSummary.hasContinuous;
                if (includeConfig && !/(config|parameter|categorical|continuous|mixed)/i.test(base)) {
                    extras.push(formatConfigSummary(configSummary, true));
                } else if (typeof configSummary.combos === 'number' && configSummary.combos > 1) {
                    extras.push(`${configSummary.combos} combos`);
                } else if (configSummary.paramsCount > 1) {
                    extras.push(`${configSummary.paramsCount} params`);
                }
            }

            if (scenario.max_trials != null && !/trial/i.test(base)) {
                extras.push(`max ${scenario.max_trials} trials`);
            }

            if (test?.markers?.includes('asyncio') && !/async/i.test(base)) {
                extras.push('async');
            }

            if (scenario.parallel_mode && !/(parallel|sequential)/i.test(base)) {
                extras.push(scenario.parallel_mode);
            }

            if (scenario.execution_mode && scenario.execution_mode !== 'edge_analytics' && !base.includes(scenario.execution_mode)) {
                extras.push(scenario.execution_mode);
            }

            const trimmedExtras = extras.filter(Boolean).slice(0, 4);
            let context = base || 'Test summary unavailable';
            if (trimmedExtras.length > 0) {
                context = `${context} (${trimmedExtras.join(', ')})`;
            }

            let gistLine = context;

            if (isRunning) {
                gistLine += ' -> running...';
            } else if (evidence) {
                const expectedParts = [];
                const expectedOutcome = formatExpectedOutcome(expected);
                if (expectedOutcome) expectedParts.push(expectedOutcome);
                const expectedTrials = formatExpectedTrials(expected, scenario);
                if (expectedTrials) expectedParts.push(expectedTrials);
                if (expected?.error_type) expectedParts.push(`error ${expected.error_type}`);

                const actualParts = [];
                const actualOutcome = formatActualOutcome(actual);
                if (actualOutcome) actualParts.push(actualOutcome);
                const actualTrials = formatActualTrials(actual, scenario);
                if (actualTrials) actualParts.push(actualTrials);

                if (expectedParts.length || actualParts.length) {
                    gistLine += ' -> ';
                    if (expectedParts.length) {
                        gistLine += `expect ${expectedParts.join(', ')}`;
                    }
                    if (actualParts.length) {
                        gistLine += expectedParts.length ? '; ' : '';
                        gistLine += `got ${actualParts.join(', ')}`;
                    }
                }
            } else if (result) {
                const outcome = result.outcome ? String(result.outcome).toUpperCase() : 'COMPLETED';
                gistLine += ` -> ${outcome}`;
            } else {
                gistLine += ' -> not run yet';
            }

            const status = isRunning ? 'running' : (result?.outcome || 'pending');
            return `
                <div class="test-gist ${status}">
                    ${escapeHtml(gistLine)}
                </div>
            `;
        }

        // Schema validation for evidence
        const EVIDENCE_SCHEMA = {
            required: ['type', 'scenario', 'expected', 'actual', 'validation_checks', 'passed'],
            scenario: {
                required: ['name', 'config_space', 'injection_mode', 'max_trials'],
                recommended: ['description', 'execution_mode', 'objectives', 'timeout', 'dataset_size']
            },
            expected: {
                required: ['outcome'],
                recommended: ['min_trials', 'max_trials']
            },
            actual: {
                required: ['type'],
                recommended: ['trial_count', 'stop_reason']
            }
        };

        function validateEvidence(evidence) {
            const issues = [];

            if (!evidence) {
                issues.push({ severity: 'error', message: 'No evidence captured' });
                return issues;
            }

            // Check required top-level fields
            for (const field of EVIDENCE_SCHEMA.required) {
                if (!(field in evidence) || evidence[field] === null || evidence[field] === undefined) {
                    issues.push({ severity: 'error', section: 'root', field, message: `Missing required field: ${field}` });
                }
            }

            // Check scenario section
            const scenario = evidence.scenario || {};
            for (const field of EVIDENCE_SCHEMA.scenario.required) {
                if (!(field in scenario) || scenario[field] === null || scenario[field] === undefined) {
                    issues.push({ severity: 'error', section: 'scenario', field, message: `Missing scenario.${field}` });
                }
            }
            for (const field of EVIDENCE_SCHEMA.scenario.recommended) {
                if (!(field in scenario) || scenario[field] === null || scenario[field] === undefined) {
                    issues.push({ severity: 'warning', section: 'scenario', field, message: `Missing scenario.${field}` });
                }
            }

            // Check config_space has at least one parameter
            const configSpace = scenario.config_space || {};
            const params = Object.keys(configSpace).filter(k => k !== '_summary');
            if (params.length === 0) {
                issues.push({ severity: 'error', section: 'scenario', field: 'config_space', message: 'Config space has no parameters' });
            }

            // Check expected section
            const expected = evidence.expected || {};
            for (const field of EVIDENCE_SCHEMA.expected.required) {
                if (!(field in expected) || expected[field] === null || expected[field] === undefined) {
                    issues.push({ severity: 'error', section: 'expected', field, message: `Missing expected.${field}` });
                }
            }

            // Check actual section
            const actual = evidence.actual || {};
            for (const field of EVIDENCE_SCHEMA.actual.required) {
                if (!(field in actual) || actual[field] === null || actual[field] === undefined) {
                    issues.push({ severity: 'error', section: 'actual', field, message: `Missing actual.${field}` });
                }
            }

            // Check trials array
            const trials = evidence.trials || [];
            if (trials.length === 0 && actual.type !== 'exception') {
                issues.push({ severity: 'warning', section: 'trials', message: 'No trial data available' });
            }

            // Check validation_checks
            const checks = evidence.validation_checks || [];
            if (checks.length === 0) {
                issues.push({ severity: 'warning', section: 'validation_checks', message: 'No validation checks recorded' });
            }

            return issues;
        }

        function buildEvidenceDisplay(test, result) {
            // If no evidence available, show a message
            if (!result?.evidence) {
                return `
                    <div class="detail-section">
                        <h3>Test Evidence</h3>
                        <p class="pending-value">Run test to capture detailed evidence</p>
                    </div>
                `;
            }

            const { scenario, expected, actual, trials, validation_checks, warnings, dataset } = result.evidence;

            // Validate evidence and show any issues
            const validationIssues = validateEvidence(result.evidence);
            const errors = validationIssues.filter(i => i.severity === 'error');
            const warns = validationIssues.filter(i => i.severity === 'warning');

            let validationBanner = '';
            if (errors.length > 0) {
                validationBanner = `
                    <div style="background: rgba(248, 113, 113, 0.1); border: 1px solid var(--error); border-radius: 6px; padding: 12px; margin-bottom: 16px;">
                        <div style="color: var(--error); font-weight: 600; margin-bottom: 8px;">⚠️ Evidence Schema Issues (${errors.length} errors)</div>
                        <ul style="margin: 0; padding-left: 20px; font-size: 12px; color: var(--error);">
                            ${errors.map(e => `<li>${escapeHtml(e.message)}</li>`).join('')}
                        </ul>
                        ${warns.length > 0 ? `<div style="margin-top: 8px; font-size: 11px; color: var(--warning);">+ ${warns.length} warnings</div>` : ''}
                    </div>
                `;
            } else if (warns.length > 0) {
                validationBanner = `
                    <div style="background: rgba(251, 191, 36, 0.1); border: 1px solid var(--warning); border-radius: 6px; padding: 8px 12px; margin-bottom: 16px; font-size: 12px; color: var(--warning);">
                        ⚠️ ${warns.length} optional field(s) missing
                    </div>
                `;
            }

            const trialCount = trials?.length || 0;

            return `
                ${validationBanner}
                <div class="detail-section">
                    <h3>Test Scenario</h3>
                    ${buildScenarioConfig(scenario)}
                </div>
                <div class="detail-section">
                    <h3>Dataset</h3>
                    ${buildDatasetSection(dataset, scenario)}
                </div>
                <div class="detail-section">
                    <h3>Configuration Space</h3>
                    ${buildConfigSpaceTable(scenario?.config_space)}
                </div>
                <div class="detail-section">
                    <h3>Trial Results (${trialCount} trial${trialCount !== 1 ? 's' : ''})</h3>
                    ${buildTrialsTable(trials, actual, test.name)}
                </div>
                <div class="detail-section">
                    <h3>Expected vs Actual</h3>
                    ${buildExpectedActualTable(expected, actual, scenario)}
                </div>
                <div class="detail-section">
                    <h3>Validation Checks</h3>
                    ${buildValidationChecksTable(validation_checks)}
                    ${warnings?.length ? `<div style="margin-top: 12px; color: var(--warning); font-size: 12px;">⚠️ ${warnings.join(', ')}</div>` : ''}
                </div>
            `;
        }

        function buildScenarioConfig(scenario) {
            if (!scenario) return '<p class="pending-value">No scenario data</p>';

            // Build optional rows only if values are present
            let optionalRows = '';

            // Algorithm (if specified)
            if (scenario.algorithm) {
                optionalRows += `
                        <tr>
                            <td class="cell-label">Algorithm</td>
                            <td><code>${escapeHtml(scenario.algorithm)}</code></td>
                        </tr>`;
            }

            // Parallel Mode (if specified)
            if (scenario.parallel_mode) {
                optionalRows += `
                        <tr>
                            <td class="cell-label">Parallel Mode</td>
                            <td><code>${escapeHtml(scenario.parallel_mode)}</code></td>
                        </tr>`;
            }

            // Constraints (if any)
            if (scenario.constraints && scenario.constraints.length > 0) {
                optionalRows += `
                        <tr>
                            <td class="cell-label">Constraints</td>
                            <td>${scenario.constraints.map(c => `<code>${escapeHtml(c)}</code>`).join(', ')}</td>
                        </tr>`;
            }

            return `
                <table class="summary-table">
                    <tbody>
                        <tr>
                            <td class="cell-label" style="width: 30%">Scenario</td>
                            <td><strong>${escapeHtml(scenario.name || '—')}</strong></td>
                        </tr>
                        <tr>
                            <td class="cell-label">Description</td>
                            <td>${escapeHtml(scenario.description || '—')}</td>
                        </tr>
                        <tr>
                            <td class="cell-label">Injection Mode</td>
                            <td><code>${escapeHtml(scenario.injection_mode || '—')}</code></td>
                        </tr>
                        <tr>
                            <td class="cell-label">Execution Mode</td>
                            <td><code>${escapeHtml(scenario.execution_mode || '—')}</code></td>
                        </tr>${optionalRows}
                        <tr>
                            <td class="cell-label">Max Trials</td>
                            <td><strong>${scenario.max_trials ?? '—'}</strong></td>
                        </tr>
                        <tr>
                            <td class="cell-label">Timeout</td>
                            <td>${scenario.timeout ?? '—'}s</td>
                        </tr>
                        <tr>
                            <td class="cell-label">Objectives</td>
                            <td>${(scenario.objectives || []).join(', ') || '—'}</td>
                        </tr>
                    </tbody>
                </table>
            `;
        }

        function buildDatasetSection(dataset, scenario) {
            if (!dataset) {
                // Fallback to scenario info if dataset not in evidence
                const size = scenario?.dataset_size ?? '?';
                return `
                    <table class="summary-table">
                        <tbody>
                            <tr>
                                <td class="cell-label" style="width: 30%">Size</td>
                                <td>${size} examples</td>
                            </tr>
                            <tr>
                                <td class="cell-label">Source</td>
                                <td class="pending-value">Dataset info not captured</td>
                            </tr>
                        </tbody>
                    </table>
                `;
            }

            const size = dataset.size ?? scenario?.dataset_size ?? '?';
            const isSmall = size < 5;
            const sizeWarning = isSmall
                ? `<span style="color: var(--warning); font-size: 11px; margin-left: 8px;">⚠ Small dataset may limit validation</span>`
                : '';

            // Format path - show relative path if it's in the project
            let displayPath = dataset.path || '—';
            if (displayPath.includes('tests/optimizer_validation/')) {
                displayPath = displayPath.substring(displayPath.indexOf('tests/optimizer_validation/'));
            }

            const sourceLabel = dataset.is_auto_generated ? 'Auto-generated' : 'Specified';

            let html = `
                <table class="summary-table">
                    <tbody>
                        <tr>
                            <td class="cell-label" style="width: 30%">Size</td>
                            <td${isSmall ? ' style="color: var(--warning);"' : ''}><strong>${size}</strong> examples${sizeWarning}</td>
                        </tr>
                        <tr>
                            <td class="cell-label">Path</td>
                            <td><code style="font-size: 11px;">${escapeHtml(displayPath)}</code></td>
                        </tr>
                        <tr>
                            <td class="cell-label">Source</td>
                            <td>${sourceLabel}</td>
                        </tr>
                    </tbody>
                </table>
            `;

            // Add collapsible samples section if samples are available
            if (dataset.samples && dataset.samples.length > 0) {
                html += `
                    <details style="margin-top: 12px;">
                        <summary style="cursor: pointer; color: var(--text-secondary); font-size: 12px;">
                            View Sample Data (${dataset.samples.length} example${dataset.samples.length !== 1 ? 's' : ''})
                        </summary>
                        <pre style="margin-top: 8px; padding: 12px; background: var(--bg-tertiary); border-radius: 4px; font-size: 11px; overflow-x: auto; max-height: 200px;">${escapeHtml(JSON.stringify(dataset.samples, null, 2))}</pre>
                    </details>
                `;
            }

            return html;
        }

        function buildTrialsTable(trials, actual, testName) {
            if (!trials || trials.length === 0) {
                return '<p class="pending-value">No trial data available</p>';
            }

            let html = `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th style="width: 8%">#</th>
                            <th style="width: 42%">Configuration</th>
                            <th style="width: 15%">Score</th>
                            <th style="width: 15%">Status</th>
                            <th style="width: 12%">Duration</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (const trial of trials) {
                const configStr = Object.entries(trial.config || {})
                    .map(([k, v]) => `${k}=${typeof v === 'number' ? v.toFixed(2) : v}`)
                    .join(', ');

                const scoreClass = trial.is_best ? 'match' : '';
                const bestMarker = trial.is_best ? ' ⭐' : '';
                const score = trial.score !== null && trial.score !== undefined
                    ? trial.score.toFixed(4)
                    : '—';

                const statusOk = trial.status === 'COMPLETED' || trial.status === 'completed';
                const statusClass = statusOk ? 'match' : 'mismatch';
                const duration = trial.duration !== null && trial.duration !== undefined
                    ? trial.duration.toFixed(3) + 's'
                    : '—';

                // Build trial index cell - make it clickable if trial_id is available
                let indexCell;
                if (trial.trial_id && testName) {
                    const escapedTestName = escapeHtml(testName).replace(/'/g, "\\'");
                    const escapedTrialId = escapeHtml(trial.trial_id).replace(/'/g, "\\'");
                    indexCell = `<a href="#" onclick="openTrialTrace('${escapedTestName}', '${escapedTrialId}', ${trial.index}); return false;"
                                   style="color: var(--accent); text-decoration: none;"
                                   title="View trace in Jaeger">${trial.index}</a>`;
                } else {
                    indexCell = `${trial.index}`;
                }

                html += `
                    <tr>
                        <td>${indexCell}</td>
                        <td style="font-size: 11px; font-family: monospace;">${escapeHtml(configStr)}</td>
                        <td class="${scoreClass}"><strong>${score}</strong>${bestMarker}</td>
                        <td class="${statusClass}">${escapeHtml(trial.status)}</td>
                        <td>${duration}</td>
                    </tr>
                `;

                // Show error if trial failed
                if (trial.error) {
                    html += `
                        <tr>
                            <td></td>
                            <td colspan="4" style="color: var(--error); font-size: 11px; padding-top: 0;">
                                ${escapeHtml(trial.error)}
                            </td>
                        </tr>
                    `;
                }
            }
            html += '</tbody></table>';

            // Summary: show best trial comparison
            const bestTrial = trials.find(t => t.is_best);
            if (bestTrial && trials.length > 1) {
                const otherScores = trials
                    .filter(t => !t.is_best && t.score !== null && t.score !== undefined)
                    .map(t => t.score);

                if (otherScores.length > 0 && bestTrial.score !== null) {
                    const allLower = otherScores.every(s => s <= bestTrial.score);
                    const comparison = allLower
                        ? `Best trial #${bestTrial.index} (${bestTrial.score.toFixed(4)}) > all others`
                        : `Best trial #${bestTrial.index} selected`;
                    html += `
                        <div style="margin-top: 8px; font-size: 11px; color: var(--success);">
                            ✓ ${comparison}
                        </div>
                    `;
                }
            }

            return html;
        }

        function buildConfigSpaceTable(configSpace) {
            if (!configSpace || Object.keys(configSpace).length === 0) {
                return '<p class="pending-value">No configuration space defined</p>';
            }

            // Extract summary if present
            const summary = configSpace._summary || {};

            let html = `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th style="width: 25%">Parameter</th>
                            <th style="width: 15%">Type</th>
                            <th>Values</th>
                            <th style="width: 12%">Options</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (const [param, config] of Object.entries(configSpace)) {
                // Skip the _summary key
                if (param === '_summary') continue;

                const type = config.type || 'unknown';
                let values = '';
                let cardinality = config.cardinality || '?';

                if (type === 'categorical') {
                    values = (config.values || []).join(', ');
                } else if (type === 'continuous') {
                    const range = config.range || [];
                    values = `[${range[0]}, ${range[1]}]`;
                } else if (type === 'fixed') {
                    values = config.value || '—';
                } else {
                    values = config.value || JSON.stringify(config);
                }

                html += `
                    <tr>
                        <td><strong>${escapeHtml(param)}</strong></td>
                        <td class="cell-label">${type}</td>
                        <td>${escapeHtml(values)}</td>
                        <td style="text-align: center;">${cardinality}</td>
                    </tr>
                `;
            }

            html += '</tbody></table>';

            // Add search space summary
            if (summary.total_space !== undefined) {
                const spaceDesc = summary.total_space === 'infinite'
                    ? '∞ (contains continuous parameters)'
                    : `${summary.categorical_combinations} combinations`;
                html += `
                    <div style="margin-top: 8px; font-size: 11px; color: var(--text-secondary);">
                        Search Space: ${spaceDesc}
                    </div>
                `;
            }

            return html;
        }

        function buildExpectedActualTable(expected, actual, scenario) {
            if (!expected || !actual) {
                return '<p class="pending-value">No comparison data available</p>';
            }

            const rows = [];

            // Outcome
            const expectedOutcomeRaw = expected.outcome || 'SUCCESS';
            const expectedOutcome = String(expectedOutcomeRaw).toLowerCase();
            const actualOutcome = actual.type === 'exception' ? 'failure' : 'success';
            const outcomeMatch = expectedOutcome === actualOutcome;
            rows.push({
                aspect: 'Outcome',
                expected: String(expectedOutcomeRaw).toUpperCase(),
                actual: actual.type === 'exception'
                    ? `EXCEPTION (${actual.exception_type})`
                    : 'SUCCESS',
                match: outcomeMatch
            });

            // Trial Count - show the actual bound from scenario
            if (expected.min_trials !== undefined || expected.max_trials !== undefined) {
                const min = expected.min_trials ?? 0;
                // Use scenario's max_trials if expected.max_trials is not set
                const scenarioMax = scenario?.max_trials;
                const max = expected.max_trials ?? scenarioMax ?? '∞';
                const actualCount = actual.trial_count ?? 'N/A';

                // Check if we hit the max_trials limit
                const hitMax = scenarioMax !== undefined &&
                    actual.trial_count !== undefined &&
                    actual.trial_count === scenarioMax;

                const match = actual.trial_count !== undefined &&
                    actual.trial_count >= min &&
                    (max === '∞' || actual.trial_count <= max);

                // Show bound info: if we hit max, indicate it
                const actualDisplay = hitMax
                    ? `${actualCount} (hit max=${scenarioMax})`
                    : String(actualCount);

                rows.push({
                    aspect: 'Trial Count',
                    expected: `${min} ≤ n ≤ ${max}`,
                    actual: actualDisplay,
                    match: actual.trial_count !== undefined ? match : null
                });
            }

            // Stop Reason - add context if max_trials_reached
            if (expected.expected_stop_reason !== undefined || actual.stop_reason) {
                const actualStop = actual.stop_reason || 'N/A';
                const match = expected.expected_stop_reason === null ||
                    expected.expected_stop_reason === undefined ||
                    expected.expected_stop_reason === actual.stop_reason;

                // Add explanation for max_trials_reached
                let stopExplanation = actualStop;
                if (actualStop === 'max_trials_reached' && scenario?.max_trials !== undefined) {
                    stopExplanation = `max_trials_reached (max=${scenario.max_trials})`;
                }

                rows.push({
                    aspect: 'Stop Reason',
                    expected: expected.expected_stop_reason || 'any',
                    actual: stopExplanation,
                    match: actual.stop_reason !== undefined ? match : null
                });
            }

            // Best Score
            if (expected.best_score_range) {
                const [minScore, maxScore] = expected.best_score_range;
                const actualScore = actual.best_score !== undefined
                    ? actual.best_score.toFixed(4)
                    : 'N/A';
                const match = actual.best_score !== undefined &&
                    actual.best_score >= minScore &&
                    actual.best_score <= maxScore;
                rows.push({
                    aspect: 'Best Score',
                    expected: `[${minScore}, ${maxScore}]`,
                    actual: actualScore,
                    match: actual.best_score !== undefined ? match : null
                });
            } else if (actual.best_score !== undefined) {
                rows.push({
                    aspect: 'Best Score',
                    expected: 'any',
                    actual: actual.best_score.toFixed(4),
                    match: true
                });
            }

            // Duration
            if (actual.duration !== undefined) {
                rows.push({
                    aspect: 'Duration',
                    expected: '< 30s',
                    actual: `${actual.duration.toFixed(3)}s`,
                    match: actual.duration < 30
                });
            }

            // Best Config (if success)
            if (actual.best_config && Object.keys(actual.best_config).length > 0) {
                const configStr = Object.entries(actual.best_config)
                    .map(([k, v]) => `${k}=${v}`)
                    .join(', ');
                rows.push({
                    aspect: 'Best Config',
                    expected: '—',
                    actual: configStr,
                    match: true
                });
            }

            // Error Type (for failures)
            if (expected.error_type) {
                const actualErrorType = actual.exception_type || 'N/A';
                const match = actual.exception_type === expected.error_type;
                rows.push({
                    aspect: 'Error Type',
                    expected: expected.error_type,
                    actual: actualErrorType,
                    match: actual.type === 'exception' ? match : null
                });
            }

            // Build HTML
            let html = `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th style="width: 25%">Aspect</th>
                            <th style="width: 35%">Expected</th>
                            <th>Actual</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (const row of rows) {
                const statusClass = row.match === null ? 'pending-value' : (row.match ? 'match' : 'mismatch');
                const statusIcon = row.match === null ? '' : (row.match ? '✓ ' : '✗ ');
                html += `
                    <tr>
                        <td class="cell-label">${row.aspect}</td>
                        <td>${escapeHtml(String(row.expected))}</td>
                        <td class="${statusClass}">${statusIcon}${escapeHtml(String(row.actual))}</td>
                    </tr>
                `;
            }

            html += '</tbody></table>';
            return html;
        }

        function buildValidationChecksTable(checks) {
            if (!checks || checks.length === 0) {
                return '<p class="pending-value">No validation checks recorded</p>';
            }

            // Filter to only show relevant checks (those with data)
            const relevantChecks = checks.filter(c =>
                !c.passed || c.expected !== undefined || c.actual !== undefined
            );

            // If all checks passed with no details, show a summary
            if (relevantChecks.length === 0) {
                const passedCount = checks.filter(c => c.passed).length;
                return `<p class="match">All ${passedCount} validation checks passed</p>`;
            }

            let html = `
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th style="width: 10%">Status</th>
                            <th style="width: 25%">Check</th>
                            <th style="width: 30%">Expected</th>
                            <th>Actual</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (const check of checks) {
                // Skip passed checks without details
                if (check.passed && !check.expected && !check.actual) {
                    continue;
                }

                const statusClass = check.passed ? 'match' : 'mismatch';
                const statusIcon = check.passed ? '✓' : '✗';
                const checkNameRaw = check.name || check.check || 'unknown';
                const checkName = checkNameRaw.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                const expected = check.expected || '—';
                const actual = check.actual || '—';
                const message = check.message || '';

                html += `
                    <tr>
                        <td class="${statusClass}" style="text-align: center; font-size: 16px;">${statusIcon}</td>
                        <td><strong>${escapeHtml(checkName)}</strong></td>
                        <td>${escapeHtml(String(expected))}</td>
                        <td class="${statusClass}">${escapeHtml(String(actual))}</td>
                    </tr>
                `;

                // Add message row if there's an error message
                if (message && !check.passed) {
                    html += `
                        <tr>
                            <td></td>
                            <td colspan="3" style="color: var(--error); font-size: 11px; padding-top: 0;">${escapeHtml(message)}</td>
                        </tr>
                    `;
                }
            }

            html += '</tbody></table>';

            // Add summary of all passed checks
            const passedChecks = checks.filter(c => c.passed);
            const failedChecks = checks.filter(c => !c.passed);
            html += `
                <div style="margin-top: 8px; font-size: 11px; color: var(--text-secondary);">
                    Summary: <span class="match">${passedChecks.length} passed</span>
                    ${failedChecks.length > 0 ? `, <span class="mismatch">${failedChecks.length} failed</span>` : ''}
                </div>
            `;

            return html;
        }

        function showRunningState() {
            const resultSection = document.querySelector('.result-status');
            if (resultSection) {
                resultSection.className = 'result-status running';
                resultSection.innerHTML = `
                    <div class="spinner"></div>
                    <span class="text">Running...</span>
                `;

        }

        function openJaeger(testName) {
            const encodedName = encodeURIComponent(`optimization: ${testName}`);
            window.open(`http://localhost:16686/search?service=traigent-optimizer&operation=${encodedName}`, '_blank');
        }

        function openTrialTrace(testName, trialId, trialIndex) {
            // Open Jaeger filtered to the specific test and trial
            // The span name for trials follows the pattern: "trial {N}: config_summary"
            // We use the parent operation (optimization) and filter by trial.id tag
            const encodedOperation = encodeURIComponent(`optimization: ${testName}`);
            const encodedTrialId = encodeURIComponent(`{"trial.id":"${trialId}"}`);
            window.open(
                `http://localhost:16686/search?service=traigent-optimizer&operation=${encodedOperation}&tags=${encodedTrialId}`,

            );
