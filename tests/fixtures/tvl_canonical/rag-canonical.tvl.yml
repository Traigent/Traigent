# Vendored from tvl/spec/examples/rag-support-bot.tvl.yml (trimmed) — pins the
# canonical TVL surface the SDK loader supports: bool `=` equality, dotted
# tvar names as FLAT keys, when/then guard form.
tvl:
  module: corp.fixtures.rag_canonical

environment:
  snapshot_id: "2026-06-05T00:00:00Z"

evaluation_set:
  dataset: s3://datasets/fixtures/dev.parquet

tvars:
  - name: model
    type: enum[str]
    domain: ["gpt-4o-mini", "gpt-4o", "llama3.1"]
  - name: temperature
    type: float
    domain:
      range: [0.0, 1.0]
      resolution: 0.05
  - name: retriever.k
    type: int
    domain:
      range: [0, 20]
  - name: zero_shot
    type: bool
    domain: [true, false]

constraints:
  structural:
    - when: zero_shot = true
      then: retriever.k = 0

objectives:
  - name: quality
    direction: maximize

promotion_policy:
  dominance: epsilon_pareto
  alpha: 0.05
  min_effect:
    quality: 0.02
